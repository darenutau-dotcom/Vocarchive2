<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voicebank & Engine Central Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        
        /* Premium Dark Theme Base */
        body { background-color: #0f172a; color: #f1f5f9; padding-top: 80px; padding-bottom: 40px; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        /* NAVIGATION BAR */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: #1e293b; border-bottom: 1px solid #334155; z-index: 2000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; }
        .nav-logo { font-size: 1.3rem; font-weight: 800; color: #ffffff; letter-spacing: -0.025em; }
        .nav-logo span { color: #e11d48; }
        .nav-menu { display: flex; gap: 15px; list-style: none; }
        .nav-btn { background: transparent; border: none; color: #94a3b8; font-size: 0.95rem; font-weight: 700; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .nav-btn:hover { color: #ffffff; background: #334155; }
        .nav-btn.active { color: #ffffff; background: #e11d48; }

        /* TABS VIEWS CONTROLLER */
        .tab-view { display: none; }
        .tab-view.active { display: grid; }

        /* LAYOUT ARCHITECTURE */
        .main-layout { grid-template-columns: 340px 1fr; gap: 35px; margin-top: 20px; }
        @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } }

        /* FORMS */
        .form-section { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); height: fit-content; position: sticky; top: 100px; transition: border-color 0.3s; }
        .form-section.editing-mode { border-color: #0ea5e9; box-shadow: 0 10px 20px -3px rgba(14, 165, 233, 0.2); }
        .form-section h2 { margin-bottom: 20px; font-size: 1.25rem; color: #ffffff; font-weight: 700; border-bottom: 2px solid #334155; padding-bottom: 8px; }
        .form-section.editing-mode h2 { color: #38bdf8; border-bottom-color: #0ea5e9; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #475569; border-radius: 6px; font-size: 0.9rem; color: #ffffff; transition: all 0.2s; background-color: #0f172a; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #e11d48; background-color: #0f172a; box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.25); }
        .form-section.editing-mode .form-group input:focus, .form-section.editing-mode .form-group select:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.25); }
        .form-group input::placeholder { color: #475569; }
        
        .btn-submit { width: 100%; padding: 12px; background: #e11d48; color: white; border: none; border-radius: 6px; font-weight: 700; font-size: 0.9rem; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-submit:hover { background: #be123c; }
        .btn-submit:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        .btn-submit.btn-edit-active { background: #0ea5e9; }
        .btn-submit.btn-edit-active:hover { background: #0284c7; }
        
        .btn-cancel-edit { display: none; width: 100%; padding: 10px; background: #334155; color: #cbd5e1; border: 1px solid #475569; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; margin-top: 8px; text-align: center; transition: all 0.2s; }
        .btn-cancel-edit:hover { background: #475569; color: #ffffff; }

        /* SEARCH & CATALOGS */
        .catalog-section { display: flex; flex-direction: column; gap: 25px; }
        .search-container { display: flex; gap: 10px; width: 100%; }
        .search-bar { flex-grow: 1; padding: 14px 24px; border: 1px solid #334155; border-radius: 8px; font-size: 0.95rem; box-shadow: 0 4px 6px rgba(0,0,0,0.2); background: #1e293b; color: #ffffff; transition: all 0.2s; }
        .search-bar:focus { outline: none; border-color: #e11d48; box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.25); }
        .search-bar::placeholder { color: #64748b; }
        .btn-clear-filter { padding: 0 20px; background: #334155; border: 1px solid #475569; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: #f1f5f9; cursor: pointer; display: none; }
        .btn-clear-filter:hover { background: #475569; }
        
        /* CARD GRID GRID SYSTEM */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: #1e293b; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); transition: transform 0.2s, box-shadow 0.2s; min-height: 480px; position: relative; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4); border-color: #475569; }

        /* IMAGE CONTROLLER */
        .card-img-box { width: 100%; aspect-ratio: 4/3; background: #0f172a; position: relative; overflow: hidden; border-bottom: 1px solid #334155; }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* AUDIO OVERLAY BOX */
        .audio-player-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .card-img-box:hover .audio-player-box { opacity: 1; }
        .play-btn { background: #ffffff; border: none; color: #0f172a; width: 50px; height: 50px; font-size: 1.2rem; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: transform 0.2s; }
        .play-btn:hover { transform: scale(1.1); background: #e11d48; color: white; }

        /* CARDS CONTENT */
        .card-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .meta-id-tag { font-size: 0.75rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .card-title { font-size: 1.15rem; font-weight: 700; color: #ffffff; margin-bottom: 12px; line-height: 1.3; height: 46px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta-line { font-size: 0.8rem; color: #94a3b8; margin-bottom: 4px; }
        .meta-line strong { color: #cbd5e1; }
        
        /* TAGS ARCHITECTURE */
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; margin-bottom: 14px; }
        .tag { font-size: 0.7rem; font-weight: 700; padding: 4px 8px; background: #0f172a; border: 1px solid #334155; border-radius: 4px; text-transform: uppercase; color: #cbd5e1; cursor: pointer; transition: all 0.15s; }
        .tag:hover { background: #e11d48; color: white; border-color: #e11d48; }
        .tag-software { background: rgba(225, 29, 72, 0.1); border-color: rgba(225, 29, 72, 0.3); color: #f43f5e; }
        .tag-software:hover { background: #e11d48; color: white; }

        /* LICENSE CONTROLS */
        .tag-free { background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.3); color: #4ade80; }
        .tag-free:hover { background: #22c55e; color: white; }
        .tag-paid { background: rgba(225, 29, 72, 0.1); border-color: rgba(225, 29, 72, 0.3); color: #f43f5e; }
        .tag-paid:hover { background: #e11d48; color: white; }
        .tag-freemium { background: rgba(234, 179, 8, 0.1); border-color: rgba(234, 179, 8, 0.3); color: #facc15; }
        .tag-freemium:hover { background: #eab308; color: white; }

        .card-actions { margin-top: auto; border-top: 1px solid #334155; padding-top: 15px; }
        .btn-view-more { display: block; width: 100%; text-align: center; background: #0f172a; color: white; padding: 11px; text-decoration: none; font-size: 0.85rem; font-weight: 700; border-radius: 6px; border: 1px solid #334155; cursor: pointer; transition: all 0.2s; }
        .btn-view-more:hover { background: #e11d48; border-color: #e11d48; }

        /* PAGINATION */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 30px; }
        .page-btn { padding: 10px 16px; border: 1px solid #334155; background: #1e293b; cursor: pointer; border-radius: 6px; font-weight: 600; color: #cbd5e1; transition: all 0.2s; }
        .page-btn:hover { border-color: #475569; background: #334155; }
        .page-btn.active { background: #e11d48; color: white; border-color: #e11d48; }

        /* MODAL SYSTEMS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); justify-content: center; align-items: center; z-index: 3000; padding: 20px; backdrop-filter: blur(6px); }
        .modal-content { background: #1e293b; width: 100%; max-width: 750px; max-height: 85vh; border-radius: 12px; padding: 30px; overflow-y: auto; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 1.8rem; cursor: pointer; color: #64748b; transition: color 0.2s; }
        .close-modal:hover { color: #f1f5f9; }
        .modal-title { font-size: 1.6rem; margin-bottom: 6px; color: #ffffff; font-weight: 800; }
        .modal-subtitle { font-size: 0.9rem; color: #94a3b8; margin-bottom: 25px; border-bottom: 2px solid #334155; padding-bottom: 12px; }
        
        .version-item { background: #0f172a; border: 1px solid #334155; padding: 20px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 20px; position: relative;}
        .version-img { width: 90px; height: 90px; object-fit: cover; border-radius: 6px; background: #1e293b; border: 1px solid #334155; }
        .version-details { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; padding-right: 120px; }
        .version-name { font-weight: 700; font-size: 1.1rem; color: #f43f5e; }
        .modal-play-btn { background: #e11d48; color: white; border: none; padding: 6px 14px; font-size: 0.8rem; font-weight: 600; border-radius: 4px; cursor: pointer; width: fit-content; margin-top: 4px; transition: background 0.2s; }
        .modal-play-btn:hover { background: #be123c; }
        
        /* Botón de editar exclusivo para el modal de versiones */
        .btn-modal-edit { background: #334155; border: 1px solid #475569; color: #cbd5e1; padding: 6px 12px; font-size: 0.8rem; font-weight: 600; border-radius: 4px; cursor: pointer; margin-top: 4px; margin-left: 8px; transition: all 0.2s; }
        .btn-modal-edit:hover { background: #0ea5e9; color: white; border-color: #0ea5e9; }

        .btn-official-web { position: absolute; right: 20px; bottom: 20px; background: #1e293b; border: 1px solid #475569; padding: 8px 14px; font-size: 0.8rem; font-weight: 700; text-decoration: none; color: #cbd5e1; border-radius: 6px; transition: all 0.2s; }
        .btn-official-web:hover { background: #334155; border-color: #94a3b8; color: #ffffff; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">VocalArchive<span>.db</span></div>
        <ul class="nav-menu">
            <li><button class="nav-btn active" onclick="switchTab('voicebanks', this)">Voicebanks</button></li>
            <li><button class="nav-btn" onclick="switchTab('softwares', this)">Softwares & Engines</button></li>
        </ul>
    </div>
</nav>

<div class="container">

    <div id="view-voicebanks" class="tab-view main-layout active">
        <aside class="form-section" id="vbFormContainer">
            <h2 id="vbFormTitle">Upload Voicebank</h2>
            <form id="voicebankForm">
                <!-- ID de la versión interna oculta de la fila en Supabase para el modo edición -->
                <input type="hidden" id="editingVersionId" value="">
                
                <div class="form-group">
                    <label for="vbId">Character ID (e.g., MIKU, IA):</label>
                    <input type="text" id="vbId" placeholder="e.g., MIKU" required style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label for="vbName">Version Name / Append:</label>
                    <input type="text" id="vbName" placeholder="e.g., Hatsune Miku V4X Dark" required>
                </div>
                <div class="form-group">
                    <label for="vbDemo">Demo Song URL (Audio) <span style="color:#64748b; font-size:0.75rem;">(Optional)</span>:</label>
                    <input type="url" id="vbDemo" placeholder="https://example.com/audio.mp3">
                </div>
                <div class="form-group">
                    <label for="vbImg">Version Image URL:</label>
                    <input type="url" id="vbImg" placeholder="https://example.com/image.jpg" required>
                </div>
                <div class="form-group">
                    <label for="vbLang">Language(s) (Comma separated):</label>
                    <input type="text" id="vbLang" placeholder="e.g., Japanese, English" required>
                </div>
                <div class="form-group">
                    <label for="vbSoftware">Software / Engine (Comma separated):</label>
                    <input type="text" id="vbSoftware" placeholder="e.g., VOCALOID6, Synthesizer V" required>
                </div>
                <div class="form-group">
                    <label for="vbDate">Release Date:</label>
                    <input type="date" id="vbDate" required>
                </div>
                <div class="form-group">
                    <label for="vbGender">Voice Gender:</label>
                    <select id="vbGender">
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                        <option value="Both / Other">Both / Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vbWeb">Official Website (URL):</label>
                    <input type="url" id="vbWeb" placeholder="https://..." required>
                </div>
                <button type="submit" id="btnSubmitVb" class="btn-submit">Register Version</button>
                <button type="button" id="btnCancelVbEdit" class="btn-cancel-edit" onclick="cancelVbEditing()">Cancel Edit</button>
            </form>
        </aside>

        <main class="catalog-section">
            <div class="search-container">
                <input type="text" id="searchBarVb" class="search-bar" placeholder="Search by character, version, languages, engines...">
                <button id="btnClearFilterVb" class="btn-clear-filter" onclick="clearFilter('vb')">Clear Filter</button>
            </div>
            <div id="catalogGridVb" class="catalog-grid"></div>
            <div id="paginationVb" class="pagination"></div>
        </main>
    </div>

    <div id="view-softwares" class="tab-view main-layout">
        <aside class="form-section">
            <h2>Upload Engine</h2>
            <form id="engineForm">
                <div class="form-group">
                    <label for="engId">Engine ID (e.g., SYNTH-V, VOCALOID):</label>
                    <input type="text" id="engId" placeholder="e.g., SYNTH-V" required style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label for="engName">Edition / Version Name:</label>
                    <input type="text" id="engName" placeholder="e.g., Synthesizer V Studio Pro" required>
                </div>
                <div class="form-group">
                    <label for="engImg">Logo / Boxart Image URL:</label>
                    <input type="url" id="engImg" placeholder="https://example.com/logo.jpg" required>
                </div>
                <div class="form-group">
                    <label for="engDev">Developer / Company:</label>
                    <input type="text" id="engDev" placeholder="e.g., Dreamtonics" required>
                </div>
                <div class="form-group">
                    <label for="engLicense">License Type:</label>
                    <select id="engLicense">
                        <option value="Paid">Paid (Licensed)</option>
                        <option value="Free">Free (Open Source / Gratis)</option>
                        <option value="Freemium">Freemium (Free Basic / Paid Pro)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="engDate">Release Date:</label>
                    <input type="date" id="engDate" required>
                </div>
                <div class="form-group">
                    <label for="engWeb">Official Website (URL):</label>
                    <input type="url" id="engWeb" placeholder="https://..." required>
                </div>
                <button type="submit" id="btnSubmitEng" class="btn-submit">Register Engine</button>
            </form>
        </aside>

        <main class="catalog-section">
            <div class="search-container">
                <input type="text" id="searchBarSw" class="search-bar" placeholder="Search by software name, developer, license...">
                <button id="btnClearFilterSw" class="btn-clear-filter" onclick="clearFilter('sw')">Clear Filter</button>
            </div>
            <div id="catalogGridSw" class="catalog-grid"></div>
            <div id="paginationSw" class="pagination"></div>
        </main>
    </div>

</div>

<div id="globalModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" class="modal-title">Log History</h2>
        <p id="modalSubtitle" class="modal-subtitle">Sub</p>
        <div id="modalList"></div>
    </div>
</div>

<audio id="globalAudioPlayer"></audio>

<script>
    const SUPABASE_URL = "https://zkurztyywzcsnfhtzavp.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprdXJ6dHl5d3pjc25maHR6YXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjIxNjcsImV4cCI6MjA5NTMzODE2N30.iFetb5DZhsbGmRlYaE-HiG9TF8rJaIV6s9jsM5C07jc";
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const itemsPerPage = 12;
    
    // Core Data Structs
    let localVbData = {}, sortedVbIds = [], filteredVbIds = [], currentPageVb = 1;
    let localSwData = {}, sortedSwIds = [], filteredSwIds = [], currentPageSw = 1;

    let isEditingVb = false; // Flag global de control de formulario

    const globalAudio = document.getElementById('globalAudioPlayer');

    // TAB MANAGER VIEW SWITCHER
    function switchTab(target, button) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-view').forEach(view => view.classList.remove('active'));
        
        button.classList.add('active');
        document.getElementById(`view-${target}`).classList.add('active');
        globalAudio.pause();
    }

    // --- SECTION 1: VOICEBANKS ENGINE ---
    async function loadVoicebanks() {
        const { data, error } = await _supabase.from('personajes').select(`id, gender, versiones ( id, name, demo, img, lang, software, date, web, created_at )`);
        if (error) return console.error(error.message);

        localVbData = {};
        data.forEach(char => {
            if(char.versiones && char.versiones.length > 0) {
                const sortedVersions = char.versiones.sort((a, b) => new Date(a.date) - new Date(b.date));
                let displayGender = (char.gender === "Femenino" || char.gender === "Female") ? "Female" : (char.gender === "Masculino" || char.gender === "Male" ? "Male" : "Other");
                localVbData[char.id] = { id: char.id, gender: displayGender, versions: sortedVersions, latestReleaseDate: new Date(sortedVersions[sortedVersions.length - 1].date) };
            }
        });
        sortedVbIds = Object.keys(localVbData).sort((a, b) => localVbData[b].latestReleaseDate - localVbData[a].latestReleaseDate);
        applyFilterVb();
    }

    document.getElementById('voicebankForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmitVb');
        btn.disabled = true; btn.innerText = "Saving...";
        const idInput = document.getElementById('vbId').value.trim().toUpperCase();
        
        try {
            await _supabase.from('personajes').upsert({ id: idInput, gender: document.getElementById('vbGender').value });
            
            const versionPayload = {
                personaje_id: idInput, 
                name: document.getElementById('vbName').value, 
                demo: document.getElementById('vbDemo').value.trim() || null,
                img: document.getElementById('vbImg').value, 
                lang: document.getElementById('vbLang').value,
                software: document.getElementById('vbSoftware').value, 
                date: document.getElementById('vbDate').value, 
                web: document.getElementById('vbWeb').value
            };

            if (isEditingVb) {
                // Inyectamos ID único numérico para sobreescribir la versión exacta seleccionada en el modal
                versionPayload.id = parseInt(document.getElementById('editingVersionId').value);
                await _supabase.from('versiones').upsert(versionPayload);
                cancelVbEditing();
            } else {
                await _supabase.from('versiones').insert(versionPayload);
                document.getElementById('voicebankForm').reset();
            }

            await loadVoicebanks();
            alert("Voicebank procesado correctamente.");
        } catch (x) { alert(x.message); } finally { btn.disabled = false; btn.innerText = isEditingVb ? "Update Version" : "Register Version"; }
    });

    // Carga dirigida de datos desde el modal hacia el formulario
    window.startVbEditDirect = function(charId, versionId) {
        const char = localVbData[charId];
        const targetedVersion = char.versions.find(v => v.id === versionId);

        if (!targetedVersion) return;

        isEditingVb = true;
        
        const container = document.getElementById('vbFormContainer');
        container.classList.add('editing-mode');
        document.getElementById('vbFormTitle').innerText = `⚠️ Editing Version: ${charId}`;
        
        const submitBtn = document.getElementById('btnSubmitVb');
        submitBtn.innerText = "Update Version";
        submitBtn.classList.add('btn-edit-active');
        document.getElementById('btnCancelVbEdit').style.display = "block";

        // Inyección de campos exactos
        document.getElementById('editingVersionId').value = targetedVersion.id;
        document.getElementById('vbId').value = char.id;
        document.getElementById('vbName').value = targetedVersion.name;
        document.getElementById('vbDemo').value = targetedVersion.demo || "";
        document.getElementById('vbImg').value = targetedVersion.img;
        document.getElementById('vbLang').value = targetedVersion.lang;
        document.getElementById('vbSoftware').value = targetedVersion.software;
        document.getElementById('vbDate').value = targetedVersion.date;
        document.getElementById('vbGender').value = char.gender;
        document.getElementById('vbWeb').value = targetedVersion.web;

        closeModal(); // Cierre automático fluido del modal
        container.scrollIntoView({ behavior: 'smooth', block: 'center' }); // Desplazamiento inteligente
    };

    window.cancelVbEditing = function() {
        isEditingVb = false;
        const container = document.getElementById('vbFormContainer');
        container.classList.remove('editing-mode');
        document.getElementById('vbFormTitle').innerText = "Upload Voicebank";
        
        const submitBtn = document.getElementById('btnSubmitVb');
        submitBtn.innerText = "Register Version";
        submitBtn.classList.remove('btn-edit-active');
        document.getElementById('btnCancelVbEdit').style.display = "none";
        
        document.getElementById('voicebankForm').reset();
        document.getElementById('editingVersionId').value = "";
    };

    function renderCatalogVb(page) {
        const grid = document.getElementById('catalogGridVb'); grid.innerHTML = "";
        if (filteredVbIds.length === 0) { grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:40px; color:#64748b;'>No voicebanks found.</p>"; return; }

        let paginated = filteredVbIds.slice((page - 1) * itemsPerPage, page * itemsPerPage);
        paginated.forEach(id => {
            const char = localVbData[id]; const latest = char.versions[char.versions.length - 1];
            
            const audioBoxHtml = (latest.demo && latest.demo.trim() !== "") 
                ? `<div class="audio-player-box"><button class="play-btn" onclick="playAudio('${latest.demo}', this)">▶</button></div>` 
                : '';

            const card = document.createElement('article'); card.className = 'card';
            card.innerHTML = `
                <div class="card-img-box"><img src="${latest.img}">${audioBoxHtml}</div>
                <div class="card-body">
                    <span class="meta-id-tag">${char.id}</span><h3 class="card-title">${latest.name}</h3>
                    <div class="meta-line"><strong>Release:</strong> ${latest.date}</div><div class="meta-line"><strong>Gender:</strong> ${char.gender}</div>
                    <div class="meta-line" style="margin-top:10px;"><strong>Languages:</strong></div>
                    <div class="tags-container">${latest.lang.split(',').map(l => `<span class="tag" onclick="filterTagVb('${l.trim()}')">${l.trim()}</span>`).join('')}</div>
                    <div class="meta-line"><strong>Software:</strong></div>
                    <div class="tags-container">${latest.software.split(',').map(s => `<span class="tag tag-software" onclick="filterTagVb('${s.trim()}')">${s.trim()}</span>`).join('')}</div>
                    <div class="card-actions"><button class="btn-view-more" onclick="openModalVb('${char.id}')">View Versions (${char.versions.length})</button></div>
                </div>`;
            grid.appendChild(card);
        });
        renderPaginationUI('paginationVb', filteredVbIds.length, page, (p) => { currentPageVb = p; renderCatalogVb(p); });
    }

    function applyFilterVb() {
        const query = document.getElementById('searchBarVb').value.toLowerCase().trim();
        document.getElementById('btnClearFilterVb').style.display = query ? "block" : "none";
        filteredVbIds = sortedVbIds.filter(id => {
            const c = localVbData[id];
            return c.id.toLowerCase().includes(query) || c.gender.toLowerCase().includes(query) || c.versions.some(v => v.name.toLowerCase().includes(query) || v.software.toLowerCase().includes(query) || v.lang.toLowerCase().includes(query));
        });
        currentPageVb = 1; renderCatalogVb(currentPageVb);
    }
    window.filterTagVb = function(t) { document.getElementById('searchBarVb').value = t; applyFilterVb(); };
    document.getElementById('searchBarVb').addEventListener('input', applyFilterVb);


    // --- SECTION 2: SOFTWARES & ENGINES ---
    async function loadSoftwares() {
        const { data, error } = await _supabase.from('engines').select(`id, developer, license, engine_versions ( name, img, release_date, official_web, created_at )`);
        if (error) return console.error(error.message);

        localSwData = {};
        data.forEach(eng => {
            if(eng.engine_versions && eng.engine_versions.length > 0) {
                const sortedVersions = eng.engine_versions.sort((a, b) => new Date(a.release_date) - new Date(b.release_date));
                localSwData[eng.id] = { id: eng.id, developer: eng.developer, license: eng.license, versions: sortedVersions, latestReleaseDate: new Date(sortedVersions[sortedVersions.length - 1].release_date) };
            }
        });
        sortedSwIds = Object.keys(localSwData).sort((a, b) => localSwData[b].latestReleaseDate - localSwData[a].latestReleaseDate);
        applyFilterSw();
    }

    document.getElementById('engineForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmitEng');
        btn.disabled = true; btn.innerText = "Saving...";
        const idInput = document.getElementById('engId').value.trim().toUpperCase();
        
        try {
            await _supabase.from('engines').upsert({ id: idInput, developer: document.getElementById('engDev').value, license: document.getElementById('engLicense').value });
            await _supabase.from('engine_versions').insert({ engine_id: idInput, name: document.getElementById('engName').value, img: document.getElementById('engImg').value, release_date: document.getElementById('engDate').value, official_web: document.getElementById('engWeb').value });
            document.getElementById('engineForm').reset();
            await loadSoftwares();
            alert("Engine registrado con éxito.");
        } catch (x) { alert(x.message); } finally { btn.disabled = false; btn.innerText = "Register Engine"; }
    });

    function renderCatalogSw(page) {
        const grid = document.getElementById('catalogGridSw'); grid.innerHTML = "";
        if (filteredSwIds.length === 0) { grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:40px; color:#64748b;'>No systems found.</p>"; return; }

        let paginated = filteredSwIds.slice((page - 1) * itemsPerPage, page * itemsPerPage);
        paginated.forEach(id => {
            const eng = localSwData[id]; const latest = eng.versions[eng.versions.length - 1];
            let licClass = eng.license.toLowerCase() === "free" ? "tag-free" : (eng.license.toLowerCase() === "freemium" ? "tag-freemium" : "tag-paid");
            const card = document.createElement('article'); card.className = 'card'; card.style.minHeight = "420px";
            card.innerHTML = `
                <div class="card-img-box"><img src="${latest.img}"></div>
                <div class="card-body">
                    <span class="meta-id-tag">${eng.id}</span><h3 class="card-title">${latest.name}</h3>
                    <div class="meta-line"><strong>Developer:</strong> ${eng.developer}</div><div class="meta-line"><strong>Latest Update:</strong> ${latest.release_date}</div>
                    <div class="meta-line" style="margin-top:10px;"><strong>License Type:</strong></div>
                    <div class="tags-container"><span class="tag ${licClass}" onclick="filterTagSw('${eng.license}')">${eng.license}</span></div>
                    <div class="card-actions"><button class="btn-view-more" onclick="openModalSw('${eng.id}')">View History (${eng.versions.length})</button></div>
                </div>`;
            grid.appendChild(card);
        });
        renderPaginationUI('paginationSw', filteredSwIds.length, page, (p) => { currentPageSw = p; renderCatalogSw(p); });
    }

    function applyFilterSw() {
        const query = document.getElementById('searchBarSw').value.toLowerCase().trim();
        document.getElementById('btnClearFilterSw').style.display = query ? "block" : "none";
        filteredSwIds = sortedSwIds.filter(id => {
            const e = localSwData[id];
            return e.id.toLowerCase().includes(query) || e.developer.toLowerCase().includes(query) || e.license.toLowerCase().includes(query) || e.versions.some(v => v.name.toLowerCase().includes(query));
        });
        currentPageSw = 1; renderCatalogSw(currentPageSw);
    }
    window.filterTagSw = function(t) { document.getElementById('searchBarSw').value = t; applyFilterSw(); };
    document.getElementById('searchBarSw').addEventListener('input', applyFilterSw);


    // --- GLOBAL UTILITIES ---
    function renderPaginationUI(containerId, totalItems, activePage, callback) {
        const container = document.getElementById(containerId); container.innerHTML = "";
        const pages = Math.ceil(totalItems / itemsPerPage); if (pages <= 1) return;
        for (let i = 1; i <= pages; i++) {
            const btn = document.createElement('button'); btn.className = `page-btn ${i === activePage ? 'active' : ''}`; btn.innerText = i;
            btn.onclick = () => { callback(i); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            container.appendChild(btn);
        }
    }

    window.clearFilter = function(mode) {
        if (mode === 'vb') { document.getElementById('searchBarVb').value = ""; applyFilterVb(); }
        else { document.getElementById('searchBarSw').value = ""; applyFilterSw(); }
    };

    // --- MODAL CONTROLLERS ---
    window.openModalVb = function(id) {
        const c = localVbData[id]; const modal = document.getElementById('globalModal');
        document.getElementById('modalTitle').innerText = `${id} - Archival Logs`;
        document.getElementById('modalSubtitle').innerText = `Total alternative configurations: ${c.versions.length}`;
        const list = document.getElementById('modalList'); list.innerHTML = "";
        
        [...c.versions].reverse().forEach(v => {
            const modalPlayBtnHtml = (v.demo && v.demo.trim() !== "")
                ? `<button class="modal-play-btn" onclick="playAudio('${v.demo}', this)">▶ Play Demo</button>`
                : '';

            list.innerHTML += `
                <div class="version-item">
                    <img class="version-img" src="${v.img}">
                    <div class="version-details">
                        <div class="version-name">${v.name}</div>
                        <div class="meta-line"><strong>Software:</strong> ${v.software}</div>
                        <div class="meta-line"><strong>Release Date:</strong> ${v.date} | <strong>Gender:</strong> ${c.gender}</div>
                        <div class="meta-line"><strong>Languages:</strong> ${v.lang}</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 4px; align-items: center;">
                            ${modalPlayBtnHtml}
                            <button class="btn-modal-edit" onclick="startVbEditDirect('${id}', ${v.id})">✏️ Edit This</button>
                        </div>
                    </div><a href="${v.web}" target="_blank" class="btn-official-web">Official Site ↗</a>
                </div>`;
        });
        modal.style.display = "flex";
    };

    window.openModalSw = function(id) {
        const e = localSwData[id]; const modal = document.getElementById('globalModal');
        document.getElementById('modalTitle').innerText = `${id} - Deploy History`;
        document.getElementById('modalSubtitle').innerText = `Total architectural releases: ${e.versions.length}`;
        const list = document.getElementById('modalList'); list.innerHTML = "";
        [...e.versions].reverse().forEach(v => {
            list.innerHTML += `
                <div class="version-item">
                    <img class="version-img" src="${v.img}">
                    <div class="version-details">
                        <div class="version-name">${v.name}</div>
                        <div class="meta-line"><strong>Developer:</strong> ${e.developer}</div>
                        <div class="meta-line"><strong>Release Date:</strong> ${v.release_date} | <strong>License:</strong> ${e.license}</div>
                    </div><a href="${v.official_web}" target="_blank" class="btn-official-web">Visit Site ↗</a>
                </div>`;
        });
        modal.style.display = "flex";
    };

    window.closeModal = function() { document.getElementById('globalModal').style.display = "none"; globalAudio.pause(); };

    window.playAudio = function(url, button) {
        if (globalAudio.src === url && !globalAudio.paused) { globalAudio.pause(); button.innerHTML = button.classList.contains('play-btn') ? "▶" : "▶ Play Demo"; } 
        else {
            document.querySelectorAll('.play-btn, .modal-play-btn').forEach(b => b.innerHTML = b.classList.contains('play-btn') ? "▶" : "▶ Play Demo");
            globalAudio.src = url; globalAudio.play(); button.innerHTML = "⏸";
        }
    };

    // BOOTSTRAP APPS
    loadVoicebanks();
    loadSoftwares();
</script>
</body>
</html>
