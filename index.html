<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voicebank Central Archive</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        
        body { 
            background-color: #0b0b0e; 
            color: #e4e4e7; 
            padding-top: 80px; 
            padding-bottom: 40px; 
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        .navbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(11, 11, 14, 0.85); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.04); 
            z-index: 2000; 
            backdrop-filter: blur(12px); 
        }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; }
        .nav-logo { font-size: 1.25rem; font-weight: 800; color: #ffffff; letter-spacing: -0.025em; }
        .nav-logo span { color: #0ea5e9; } 
        .nav-menu { display: flex; gap: 10px; list-style: none; }
        .nav-btn { 
            background: transparent; 
            border: none; 
            color: #a1a1aa; 
            font-size: 0.9rem; 
            font-weight: 600; 
            padding: 8px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .nav-btn:hover { color: #ffffff; background: rgba(255, 255, 255, 0.04); }
        .nav-btn.active { color: #ffffff; background: rgba(14, 165, 233, 0.15); border: 1px solid rgba(14, 165, 233, 0.3); }

        .tab-view { display: none; }
        .tab-view.active { display: grid; }

        .main-layout { display: grid; grid-template-columns: 340px 1fr; gap: 25px; margin-top: 20px; }

        .form-section { 
            background: #121216; 
            padding: 25px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            height: fit-content; 
            position: sticky; 
            top: 100px; 
            transition: all 0.3s; 
        }
        .form-section.editing-mode { border-color: #0ea5e9; box-shadow: 0 10px 25px rgba(14, 165, 233, 0.1); }
        .form-section h2 { margin-bottom: 20px; font-size: 1.15rem; color: #ffffff; font-weight: 700; border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding-bottom: 12px; letter-spacing: -0.01em; }
        .form-section.editing-mode h2 { color: #38bdf8; border-bottom-color: rgba(14, 165, 233, 0.3); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; font-size: 0.9rem; color: #ffffff; transition: all 0.2s; background-color: #1a1a22; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #0ea5e9; background-color: #1a1a22; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        .form-group input::placeholder { color: #52525b; }
        
        .btn-submit { width: 100%; padding: 12px; background: #0ea5e9; color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 0.9rem; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
        .btn-submit:hover { background: #0284c7; transform: translateY(-1px); }
        .btn-submit:disabled { background: #27272a; color: #52525b; cursor: not-allowed; transform: none; }
        
        .btn-cancel-edit { display: none; width: 100%; padding: 10px; background: transparent; color: #a1a1aa; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; margin-top: 8px; text-align: center; transition: all 0.2s; }
        .btn-cancel-edit:hover { background: rgba(255, 255, 255, 0.04); color: #ffffff; }

        .catalog-section { display: flex; flex-direction: column; gap: 25px; }
        .search-container { display: flex; gap: 10px; width: 100%; }
        .search-bar { flex-grow: 1; padding: 14px 24px; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; font-size: 0.95rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); background: #121216; color: #ffffff; transition: all 0.2s; }
        .search-bar:focus { outline: none; border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        .search-bar::placeholder { color: #42424a; }
        .btn-clear-filter { padding: 0 20px; background: #1a1a22; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; font-size: 0.85rem; font-weight: 600; color: #f4f4f5; cursor: pointer; display: none; }
        .btn-clear-filter:hover { background: rgba(255, 255, 255, 0.04); }
        
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        
        .card { 
            background: #121216; 
            border-radius: 16px; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            gap: 16px;
            padding: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            cursor: pointer;
        }
        .card:hover { 
            transform: translateY(-2px); 
            background: #1a1a22; 
            border-color: rgba(14, 165, 233, 0.3); 
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6); 
        }

        .card-img-box { width: 75px; height: 75px; border-radius: 12px; overflow: hidden; background: #0b0b0e; position: relative; flex-shrink: 0; }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .audio-player-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 11, 14, 0.7); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .card-img-box:hover .audio-player-box { opacity: 1; }
        .play-btn { background: #ffffff; border: none; color: #0b0b0e; width: 32px; height: 32px; font-size: 0.9rem; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: transform 0.2s; }
        .play-btn:hover { transform: scale(1.1); background: #0ea5e9; color: white; }

        .card-body { padding: 0; display: flex; flex-direction: column; flex-grow: 1; min-width: 0; }
        .meta-id-tag { font-size: 0.7rem; color: #71717a; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: #ffffff; margin-bottom: 4px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .tag { font-size: 0.65rem; font-weight: 700; padding: 2px 7px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; text-transform: uppercase; color: #a1a1aa; cursor: pointer; transition: all 0.15s; }
        .tag:hover { background: #0ea5e9; color: white; border-color: #0ea5e9; }
        .tag-software { background: rgba(14, 165, 233, 0.06); border-color: rgba(14, 165, 233, 0.15); color: #38bdf8; }
        .tag-software:hover { background: #0ea5e9; color: white; }
        
        .card-action-icon { width: 32px; height: 32px; border-radius: 50%; background: transparent; display: flex; align-items: center; justify-content: center; color: #43434a; flex-shrink: 0; transition: all 0.2s ease; }
        .card:hover .card-action-icon { background: rgba(14, 165, 233, 0.1); color: #0ea5e9; transform: translateX(2px); }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 30px; }
        .page-btn { padding: 10px 16px; border: 1px solid rgba(255, 255, 255, 0.06); background: #121216; cursor: pointer; border-radius: 8px; font-weight: 600; color: #a1a1aa; transition: all 0.2s; }
        .page-btn:hover { border-color: rgba(255, 255, 255, 0.15); background: #1a1a22; color: #ffffff; }
        .page-btn.active { background: #0ea5e9; color: white; border-color: #0ea5e9; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 6, 0.85); justify-content: center; align-items: center; z-index: 3000; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { background: #121216; width: 100%; max-width: 750px; max-height: 85vh; border-radius: 16px; padding: 30px; overflow-y: auto; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 1.8rem; cursor: pointer; color: #52525b; transition: color 0.2s; }
        .close-modal:hover { color: #ffffff; }
        .modal-title { font-size: 1.5rem; margin-bottom: 6px; color: #ffffff; font-weight: 800; letter-spacing: -0.02em; }
        .modal-subtitle { font-size: 0.85rem; color: #71717a; margin-bottom: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding-bottom: 12px; }
        
        audio::-webkit-media-controls-panel { background-color: #1a1a22; }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display { color: #ffffff; }

        .version-item { background: #0b0b0e; border: 1px solid rgba(255, 255, 255, 0.04); padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 20px; position: relative;}
        .version-img { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; background: #121216; border: 1px solid rgba(255, 255, 255, 0.04); flex-shrink: 0; }
        .version-details { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; padding-right: 120px; }
        .version-name { font-weight: 700; font-size: 1.1rem; color: #38bdf8; }
        .modal-play-btn { background: #0ea5e9; color: white; border: none; padding: 7px 14px; font-size: 0.8rem; font-weight: 700; border-radius: 6px; cursor: pointer; width: fit-content; margin-top: 4px; transition: background 0.2s; }
        .modal-play-btn:hover { background: #0284c7; }
        
        .btn-modal-edit { background: transparent; border: 1px solid rgba(255, 255, 255, 0.1); color: #a1a1aa; padding: 6px 12px; font-size: 0.8rem; font-weight: 600; border-radius: 6px; cursor: pointer; margin-top: 4px; transition: all 0.2s; }
        .btn-modal-edit:hover { background: rgba(255, 255, 255, 0.04); color: white; border-color: rgba(255, 255, 255, 0.2); }

        .btn-official-web { position: absolute; right: 20px; bottom: 20px; background: #121216; border: 1px solid rgba(255, 255, 255, 0.08); padding: 8px 14px; font-size: 0.8rem; font-weight: 700; text-decoration: none; color: #cbd5e1; border-radius: 8px; transition: all 0.2s; }
        .btn-official-web:hover { background: #1a1a22; border-color: rgba(255, 255, 255, 0.2); color: #ffffff; }

        .ratings-panel { margin-top: 8px; background: #121216; border: 1px solid rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; max-width: 420px; }
        .rating-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.75rem; color: #a1a1aa; }
        .rating-label { font-weight: 600; min-width: 120px; text-transform: uppercase; letter-spacing: 0.02em; color: #71717a; }
        .rating-bar-container { flex-grow: 1; height: 6px; background: #1a1a22; border-radius: 3px; margin: 0 10px; overflow: hidden; position: relative; }
        .rating-bar-fill { height: 100%; background: #0ea5e9; width: 0%; border-radius: 3px; transition: width 0.5s ease; }
        .rating-value { font-weight: 700; color: #ffffff; width: 24px; text-align: right; }
        
        .rating-slider { width: 100%; margin: 0; cursor: pointer; accent-color: #0ea5e9; height: 6px; background: #1a1a22; border-radius: 3px; }
        .rate-toggle-btn { background: transparent; border: none; color: #0ea5e9; font-size: 0.75rem; font-weight: 700; cursor: pointer; text-decoration: underline; margin-top: 4px; width: fit-content; padding: 0; text-underline-offset: 2px; }
        .rate-toggle-btn:hover { color: #38bdf8; }
        .rate-toggle-btn:disabled { color: #52525b; text-decoration: none; cursor: not-allowed; }
        .btn-submit-vote { background: rgba(14, 165, 233, 0.1); border: 1px solid rgba(14, 165, 233, 0.3); color: #38bdf8; font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; cursor: pointer; margin-top: 6px; width: fit-content; transition: all 0.2s; text-transform: uppercase; }
        .btn-submit-vote:hover { background: #0ea5e9; color: white; }

        /* Floating Feedback Button */
        .btn-floating-feedback {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #0ea5e9; 
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 2500;
            transition: all 0.2s ease-in-out;
        }
        .btn-floating-feedback:hover {
            transform: translateY(-3px) scale(1.03);
            background: #38bdf8;
            box-shadow: 0 15px 25px rgba(14, 165, 233, 0.4);
        }

        /* --- CORRECCIONES RESPONSIVE PREMIUM --- */
        @media (max-width: 900px) { 
            body { padding-top: 140px; }
            .main-layout { grid-template-columns: 1fr; gap: 20px; }
            .form-section { position: relative !important; top: 0 !important; box-shadow: none; }
            .nav-container { flex-direction: column; gap: 12px; padding: 12px 20px; }
        }

        @media (max-width: 600px) {
            .modal-content { padding: 20px 16px; max-height: 90vh; }
            .modal-title { font-size: 1.25rem; }
            
            .version-item { flex-direction: column !important; gap: 18px !important; align-items: center; padding: 16px; }
            .version-item > div { flex-direction: column !important; gap: 14px !important; text-align: center; width: 100%; }
            
            .version-img { width: 120px !important; height: 120px !important; object-fit: contain !important; margin: 0 auto; display: block; border-radius: 10px; }
            
            .version-details { padding-right: 0 !important; align-items: center; width: 100%; }
            .version-details .tags-container { justify-content: center; margin-bottom: 6px; }
            
            .version-details audio { width: 100% !important; max-width: 100% !important; margin-top: 4px; }
            .btn-modal-edit { margin-top: 10px !important; width: 100%; text-align: center; justify-content: center; }
            
            .btn-official-web { position: relative !important; right: 0 !important; bottom: 0 !important; display: block; width: 100%; text-align: center; margin-top: 14px; margin-bottom: 4px; box-sizing: border-box; padding: 11px; }
            
            .ratings-panel { max-width: 100% !important; width: 100%; margin-top: 12px; }
            body { padding-bottom: 90px; }
            .btn-floating-feedback { padding: 10px 16px; font-size: 0.8rem; bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">VocalArchive<span>.db</span></div>
        <ul class="nav-menu">
            <li><button class="nav-btn active" onclick="switchTab('voicebanks', this)">Voicebanks</button></li>
            <li><button class="nav-btn" onclick="triggerSurpriseVb()" style="color: #facc15; font-weight: 800;">🎲 Surprise Me</button></li>
        </ul>
    </div>
</nav>

<div class="container">

    <!-- Voicebanks Layout View -->
    <div id="view-voicebanks" class="tab-view main-layout active">
        <aside class="form-section" id="vbFormContainer">
            <h2 id="vbFormTitle">Upload Voicebank</h2>
            <form id="voicebankForm">
                <input type="hidden" id="editingVersionId" value="">
                
                <div class="form-group">
                    <label for="vbId">Character ID (e.g., MIKU, IA):</label>
                    <input type="text" id="vbId" placeholder="e.g., MIKU" required style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label for="vbName">Version Name / Append:</label>
                    <input type="text" id="vbName" placeholder="e.g., Hatsune Miku V4X Dark" required>
                </div>
                <div class="form-group">
                    <label for="vbDemo">Demo Song URL (Audio) <span style="color:#52525b; font-size:0.75rem;">(Optional)</span>:</label>
                    <input type="url" id="vbDemo" placeholder="https://example.com/audio.mp3">
                </div>
                <div class="form-group">
                    <label for="vbImg">Version Image URL:</label>
                    <input type="url" id="vbImg" placeholder="https://example.com/image.jpg" required>
                </div>
                <div class="form-group">
                    <label for="vbLang">Language(s) (Comma separated):</label>
                    <input type="text" id="vbLang" placeholder="e.g., Japanese, English" required>
                </div>
                <div class="form-group">
                    <label for="vbSoftware">Software / Engine (Comma separated):</label>
                    <input type="text" id="vbSoftware" placeholder="e.g., VOCALOID6, Synthesizer V" required>
                </div>
                <div class="form-group">
                    <label for="vbGenres">Optimal Genres / Styles (Comma separated):</label>
                    <input type="text" id="vbGenres" placeholder="e.g., Pop, Metal, J-Rock">
                </div>
                <div class="form-group">
                    <label for="vbDate">Release Date:</label>
                    <input type="date" id="vbDate" required>
                </div>
                <div class="form-group">
                    <label for="vbGender">Voice Gender:</label>
                    <select id="vbGender">
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                        <option value="Both / Other">Both / Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vbWeb">Official Website (URL):</label>
                    <input type="url" id="vbWeb" placeholder="https://..." required>
                </div>
                <button type="submit" id="btnSubmitVb" class="btn-submit">Register Version</button>
                <button type="button" id="btnCancelVbEdit" class="btn-cancel-edit" onclick="cancelVbEditing()">Cancel Edit</button>

        </aside>

        <main class="catalog-section">
            <div class="search-container">
                <input type="text" id="searchBarVb" class="search-bar" placeholder="Search by character, version, languages, engines, genres...">
                <button id="btnClearFilterVb" class="btn-clear-filter" onclick="clearFilter('vb')">Clear Filter</button>
            </div>
            <div id="catalogGridVb" class="catalog-grid"></div>
            <div id="paginationVb" class="pagination"></div>
        </main>
    </div>

</div>

<!-- Global Detailed View Modal -->

    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>

<script>
    // --- SUPABASE ARCHITECTURE CONFIGURATION ---
    const SUPABASE_URL = "YOUR_SUPABASE_URL"; 
    const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY"; 
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Global Audio context engine
    const globalAudio = new Audio();
    
    // Core state management architecture
    let voicebanksData = [];
    let sortedVbIds = [];
    let currentVbPage = 1;
    const itemsPerPage = 12;
    let activeVbFilter = "";

    // Target UI element references
    const catalogGridVb = document.getElementById('catalogGridVb');
    const searchBarVb = document.getElementById('searchBarVb');
    const btnClearFilterVb = document.getElementById('btnClearFilterVb');
    const paginationVb = document.getElementById('paginationVb');
    const voicebankForm = document.getElementById('voicebankForm');

    // --- LIFE CYCLE INITIALIZATION ---
    document.addEventListener("DOMContentLoaded", () => {
        loadVoicebanks();
        setupSearchEventListeners();
        setupFormSubmissions();
    });

    // --- DATA CAPTURE LAYER ---
    async function loadVoicebanks() {
        try {
            // Se leen los voicebanks y sus votaciones agregadas desde Supabase
            const { data, error } = await supabase.from('voicebanks').select('*').order('character_id', { ascending: true });
            if (error) throw error;
            
            voicebanksData = data || [];
            processVoicebanksData();
            renderVbCatalog();
        } catch (err) {
            console.error("Critical database connection error (Voicebanks):", err.message);
        }
    }

    function processVoicebanksData() {
        const characterGroups = {};
        voicebanksData.forEach(vb => {
            if (!characterGroups[vb.character_id]) characterGroups[vb.character_id] = [];
            characterGroups[vb.character_id].push(vb);
        });
        sortedVbIds = Object.keys(characterGroups).sort();
    }

    // --- SEARCH & DATA FILTERING LAYER ---
    function setupSearchEventListeners() {
        searchBarVb.addEventListener('input', (e) => {
            activeVbFilter = e.target.value.toLowerCase().trim();
            currentVbPage = 1;
            btnClearFilterVb.style.display = activeVbFilter ? "block" : "none";
            renderVbCatalog();
        });
    }

    window.clearFilter = function(type) {
        if (type === 'vb') {
            searchBarVb.value = "";
            activeVbFilter = "";
            btnClearFilterVb.style.display = "none";
            renderVbCatalog();
        }
    };

    window.filterByTag = function(tagValue) {
        searchBarVb.value = tagValue;
        activeVbFilter = tagValue.toLowerCase().trim();
        currentVbPage = 1;
        btnClearFilterVb.style.display = "block";
        renderVbCatalog();
    };

    // --- CATALOG PRESENTATION GRAPHICS LAYER ---
    function renderVbCatalog() {
        catalogGridVb.innerHTML = "";
        
        let filteredIds = sortedVbIds.filter(charId => {
            const group = voicebanksData.filter(v => v.character_id === charId);
            if (charId.toLowerCase().includes(activeVbFilter)) return true;
            
            return group.some(vb => 
                vb.version_name.toLowerCase().includes(activeVbFilter) ||
                vb.languages.toLowerCase().includes(activeVbFilter) ||
                vb.software_engine.toLowerCase().includes(activeVbFilter) ||
                (vb.optimal_genres && vb.optimal_genres.toLowerCase().includes(activeVbFilter))
            );
        });

        if (filteredIds.length === 0) {
            catalogGridVb.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #52525b; padding: 40px; font-weight: 600;">No character voicebanks match your current query criteria.</div>`;
            paginationVb.innerHTML = "";
            return;
        }

        const totalPages = Math.ceil(filteredIds.length / itemsPerPage);
        if (currentVbPage > totalPages) currentVbPage = totalPages || 1;
        
        const startIdx = (currentVbPage - 1) * itemsPerPage;
        const pageIds = filteredIds.slice(startIdx, startIdx + itemsPerPage);

        pageIds.forEach(charId => {
            const group = voicebanksData.filter(v => v.character_id === charId);
            const primaryVb = group[0]; 
            
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openModalVb(charId);

            // Extraer idiomas y motores únicos para los tags de la tarjeta
            const languagesSet = new Set();
            const enginesSet = new Set();
            group.forEach(v => {
                v.languages.split(',').forEach(l => languagesSet.add(l.trim()));
                v.software_engine.split(',').forEach(e => enginesSet.add(e.trim()));
            });
            
            const languagesArr = Array.from(languagesSet).slice(0, 2);
            const enginesArr = Array.from(enginesSet).slice(0, 1);

            let audioPlaybackMarkup = "";
            if (primaryVb.demo_url) {
                audioPlaybackMarkup = `
                    <div class="audio-player-box" onclick="event.stopPropagation();">
                        <button class="play-btn" onclick="playAudio('${primaryVb.demo_url}', this)">▶</button>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="card-img-box">
                    <img src="${primaryVb.image_url || 'https://via.placeholder.com/150'}" alt="${charId}">
                    ${audioPlaybackMarkup}
                </div>
                <div class="card-body">
                    <div class="meta-id-tag">${charId}</div>
                    <div class="card-title">${charId} Overview</div>
                    <div style="font-size: 0.75rem; color: #71717a; font-weight: 600;">${group.length} Version(s) registered</div>
                    <div class="tags-container" onclick="event.stopPropagation();">
                        ${enginesArr.map(eng => `<span class="tag tag-software" onclick="filterByTag('${eng}')">${eng}</span>`).join('')}
                        ${languagesArr.map(lang => `<span class="tag" onclick="filterByTag('${lang}')">${lang}</span>`).join('')}
                    </div>
                </div>
                <div class="card-action-icon">➔</div>
            `;
            catalogGridVb.appendChild(card);
        });

        renderPaginationControls(paginationVb, totalPages, currentVbPage, (newPage) => {
            currentVbPage = newPage;
            renderVbCatalog();
        });
    }

    function renderPaginationControls(container, totalPages, currentPage, onPageChange) {
        container.innerHTML = "";
        if (totalPages <= 1) return;

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.innerText = i;
            btn.onclick = () => onPageChange(i);
            container.appendChild(btn);
        }
    }

    // --- DETAILED VIEW MODAL ARCHITECTURE LAYER ---
    window.openModalVb = function(charId) {
        const group = voicebanksData.filter(v => v.character_id === charId);
        if (group.length === 0) return;

        const modal = document.getElementById('globalModal');
        const title = document.getElementById('modalTitle');
        const subtitle = document.getElementById('modalSubtitle');
        const container = document.getElementById('modalVersionsContainer');

        title.innerText = `${charId} - Virtual Vocal Profile`;
        subtitle.innerText = `Displaying information records for ${group.length} verified system version release(s).`;
        container.innerHTML = "";

        group.forEach(vb => {
            const item = document.createElement('div');
            item.className = 'version-item';

            // Análisis de metadata del voicebank
            const langTags = vb.languages.split(',').map(l => `<span class="tag" onclick="closeModal(); filterByTag('${l.trim()}')">${l.trim()}</span>`).join('');
            const engineTags = vb.software_engine.split(',').map(e => `<span class="tag tag-software" onclick="closeModal(); filterByTag('${e.trim()}')">${e.trim()}</span>`).join('');
            const genreTags = vb.optimal_genres ? vb.optimal_genres.split(',').map(g => `<span class="tag" onclick="closeModal(); filterByTag('${g.trim()}')">${g.trim()}</span>`).join('') : '';

            // Renderizado del reproductor o aviso de falta de demo
            let audioSnippet = `<span style="font-size:0.75rem; color:#52525b; font-weight:600; font-style:italic;">No direct audio demo configuration file available.</span>`;
            if (vb.demo_url) {
                audioSnippet = `<audio controls src="${vb.demo_url}" style="width: 100%; max-width: 320px; height: 32px; border-radius: 6px;"></audio>`;
            }

            // Módulo de calificaciones técnicas del voicebank
            const qualityAvg = vb.rating_quality_count > 0 ? (vb.rating_quality_sum / vb.rating_quality_count).toFixed(1) : "0.0";
            const clarityAvg = vb.rating_clarity_count > 0 ? (vb.rating_clarity_sum / vb.rating_clarity_count).toFixed(1) : "0.0";
            const usabilityAvg = vb.rating_usability_count > 0 ? (vb.rating_usability_sum / vb.rating_usability_count).toFixed(1) : "0.0";

            item.innerHTML = `
                <img src="${vb.image_url || 'https://via.placeholder.com/150'}" class="version-img" alt="${vb.version_name}">
                <div class="version-details">
                    <div class="version-name">${vb.version_name}</div>
                    <div style="font-size: 0.8rem; color: #a1a1aa;"><strong style="color:#71717a;">Gender Profile:</strong> ${vb.gender || 'Not specified'} | <strong style="color:#71717a;">Released:</strong> ${vb.release_date || 'Unknown'}</div>
                    <div class="tags-container" style="margin-bottom:4px;">${engineTags}${langTags}${genreTags}</div>
                    ${audioSnippet}
                    
                    <!-- Panel de Evaluación Multi-Criterio -->
                    <div class="ratings-panel">
                        <div class="rating-row">
                            <span class="rating-label">Recording Quality:</span>
                            <div class="rating-bar-container"><div class="rating-bar-fill" style="width: ${parseFloat(qualityAvg)*20}%"></div></div>
                            <span class="rating-value">${qualityAvg}</span>
                        </div>
                        <div class="rating-row">
                            <span class="rating-label">Linguistic Clarity:</span>
                            <div class="rating-bar-container"><div class="rating-bar-fill" style="width: ${parseFloat(clarityAvg)*20}%"></div></div>
                            <span class="rating-value">${clarityAvg}</span>
                        </div>
                        <div class="rating-row">
                            <span class="rating-label">Ease of Use:</span>
                            <div class="rating-bar-container"><div class="rating-bar-fill" style="width: ${parseFloat(usabilityAvg)*20}%"></div></div>
                            <span class="rating-value">${usabilityAvg}</span>
                        </div>
                        
                        <div id="vote-form-${vb.id}" style="display:none; margin-top:10px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">
                            <div style="margin-bottom:6px;">
                                <label style="display:block; font-size:0.7rem; color:#71717a; font-weight:700;">RECORDING QUALITY (1-5):</label>
                                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sld-quality-${vb.id}">
                            </div>
                            <div style="margin-bottom:6px;">
                                <label style="display:block; font-size:0.7rem; color:#71717a; font-weight:700;">LINGUISTIC CLARITY (1-5):</label>
                                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sld-clarity-${vb.id}">
                            </div>
                            <div style="margin-bottom:6px;">
                                <label style="display:block; font-size:0.7rem; color:#71717a; font-weight:700;">EASE OF USE (1-5):</label>
                                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sld-usability-${vb.id}">
                            </div>
                            <button class="btn-submit-vote" onclick="submitVbVote(${vb.id})">Cast Ratings</button>
                        </div>
                        <button class="rate-toggle-btn" id="btn-toggle-vote-${vb.id}" onclick="document.getElementById('vote-form-${vb.id}').style.display='block'; this.style.display='none';">⭐ Evaluate this Version</button>
                    </div>

                    <div>
                        <button class="btn-modal-edit" onclick="closeModal(); enableVbEditingMode(${vb.id});">⚙ Edit Technical Record</button>
                    </div>
                </div>
                <a href="${vb.official_website_url}" target="_blank" class="btn-official-web">Official Distribution ↗</a>
            `;
            container.appendChild(item);
        });

        modal.style.display = "flex";
    };

    // --- ANALYTICS & RATING MANAGEMENT LAYER (IP TRACKED) ---
    window.submitVbVote = async function(vbId) {
        // Deshabilitar botón para mitigar spam inmediato
        const btnVote = document.querySelector(`#vote-form-${vbId} .btn-submit-vote`);
        if(btnVote) btnVote.disabled = true;

        const qVal = parseInt(document.getElementById(`sld-quality-${vbId}`).value) || 5;
        const cVal = parseInt(document.getElementById(`sld-clarity-${vbId}`).value) || 5;
        const uVal = parseInt(document.getElementById(`sld-usability-${vbId}`).value) || 5;

        try {
            // Protección de integridad mediante rastreo IP simulado de lado del cliente
            const ipResponse = await fetch('https://api.ipify.org?format=json').catch(() => null);
            let userIp = "0.0.0.0";
            if (ipResponse) {
                const ipData = await ipResponse.json();
                userIp = ipData.ip;
            }

            // Comprobación de duplicados de IP localizados en base de datos
            const { data: existingVote, error: checkError } = await supabase
                .from('voicebank_ratings_log')
                .select('id')
                .eq('voicebank_id', vbId)
                .eq('user_ip', userIp)
                .maybeSingle();

            if (checkError) throw checkError;

            if (existingVote) {
                alert("Security Filter: Your network IP has already recorded evaluation metrics for this specific engine architecture.");
                if(btnVote) btnVote.disabled = false;
                return;
            }

            // Transacción: Registro del log de IP
            const { error: logError } = await supabase
                .from('voicebank_ratings_log')
                .insert([{ voicebank_id: vbId, user_ip: userIp }]);
            
            if (logError) throw logError;

            // Transacción: Agregación incremental a la tabla maestra
            const targetVb = voicebanksData.find(v => v.id === vbId);
            if (!targetVb) return;

            const { error: updateError } = await supabase
                .from('voicebanks')
                .update({
                    rating_quality_sum: (targetVb.rating_quality_sum || 0) + qVal,
                    rating_quality_count: (targetVb.rating_quality_count || 0) + 1,
                    rating_clarity_sum: (targetVb.rating_clarity_sum || 0) + cVal,
                    rating_clarity_count: (targetVb.rating_clarity_count || 0) + 1,
                    rating_usability_sum: (targetVb.rating_usability_sum || 0) + uVal,
                    rating_usability_count: (targetVb.rating_usability_count || 0) + 1
                })
                .eq('id', vbId);

            if (updateError) throw updateError;

            alert("Validation Success: Evaluation analytics successfully merged into international matrix.");
            await reloadModalAfterVote();

        } catch(err) {
            console.error("Critical Vote Architecture Error:", err.message);
            if(btnVote) btnVote.disabled = false;
        }
    };

    // --- FORM DATA PROCESSING & CREATION LAYER ---
    function setupFormSubmissions() {
        voicebankForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmitVb');
            btnSubmit.disabled = true;

            const editingId = document.getElementById('editingVersionId').value;
            
            const vbPayload = {
                character_id: document.getElementById('vbId').value.toUpperCase().trim(),
                version_name: document.getElementById('vbName').value.trim(),
                demo_url: document.getElementById('vbDemo').value.trim() || null,
                image_url: document.getElementById('vbImg').value.trim(),
                languages: document.getElementById('vbLang').value.trim(),
                software_engine: document.getElementById('vbSoftware').value.trim(),
                optimal_genres: document.getElementById('vbGenres').value.trim() || null,
                release_date: document.getElementById('vbDate').value,
                gender: document.getElementById('vbGender').value,
                official_website_url: document.getElementById('vbWeb').value.trim()
            };

            try {
                if (editingId) {
                    // Acción de actualización
                    const { error } = await supabase.from('voicebanks').update(vbPayload).eq('id', editingId);
                    if (error) throw error;
                    alert("Technical update committed successfully.");
                } else {
                    // Acción de inserción (Inicializando las métricas de votación en 0)
                    vbPayload.rating_quality_sum = 0;
                    vbPayload.rating_quality_count = 0;
                    vbPayload.rating_clarity_sum = 0;
                    vbPayload.rating_clarity_count = 0;
                    vbPayload.rating_usability_sum = 0;
                    vbPayload.rating_usability_count = 0;

                    const { error } = await supabase.from('voicebanks').insert([vbPayload]);
                    if (error) throw error;
                    alert("New character system version successfully archived.");
                }

                cancelVbEditing();
                await loadVoicebanks();
            } catch (err) {
                alert("Database write error: " + err.message);
            } finally {
                btnSubmit.disabled = false;
            }
        });
    }

    // --- SYSTEM EDITING STATE INTERFACE MODIFIERS ---
    window.enableVbEditingMode = function(id) {
        const vb = voicebanksData.find(v => v.id === id);
        if (!vb) return;

        document.getElementById('view-voicebanks').scrollIntoView({ behavior: 'smooth' });

        const formContainer = document.getElementById('vbFormContainer');
        formContainer.classList.add('editing-mode');

        document.getElementById('vbFormTitle').innerText = `Editing: ${vb.version_name}`;
        document.getElementById('editingVersionId').value = vb.id;
        
        document.getElementById('vbId').value = vb.character_id;
        document.getElementById('vbName').value = vb.version_name;
        document.getElementById('vbDemo').value = vb.demo_url || "";
        document.getElementById('vbImg').value = vb.image_url;
        document.getElementById('vbLang').value = vb.languages;
        document.getElementById('vbSoftware').value = vb.software_engine;
        document.getElementById('vbGenres').value = vb.optimal_genres || "";
        document.getElementById('vbDate').value = vb.release_date || "";
        document.getElementById('vbGender').value = vb.gender;
        document.getElementById('vbWeb').value = vb.official_website_url;

        document.getElementById('btnSubmitVb').innerText = "Commit Changes";
        document.getElementById('btnCancelVbEdit').style.display = "block";
    };

    window.cancelVbEditing = function() {
        const formContainer = document.getElementById('vbFormContainer');
        formContainer.classList.remove('editing-mode');

        document.getElementById('vbFormTitle').innerText = "Upload Voicebank";
        document.getElementById('editingVersionId').value = "";
        voicebankForm.reset();

        document.getElementById('btnSubmitVb').innerText = "Register Version";
        document.getElementById('btnCancelVbEdit').style.display = "none";
    };
</script>

<!-- Global Script Overrides implementados en la cabecera para compatibilidad -->
<script>
    window.switchTab = function(tabName, btn) {
        document.querySelectorAll('.tab-view').forEach(view => view.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        const targetView = document.getElementById(`view-${tabName}`);
        if(targetView) targetView.classList.add('active');
        if(btn) btn.classList.add('active');
        globalAudio.pause();
    };

    window.closeModal = function() { 
        document.getElementById('globalModal').style.display = "none"; 
        globalAudio.pause(); 
    };

    window.playAudio = function(url, button) {
        if (globalAudio.src === url && !globalAudio.paused) { 
            globalAudio.pause(); 
            button.innerHTML = button.classList.contains('play-btn') ? "▶" : "▶ Play Demo"; 
        } else {
            document.querySelectorAll('.play-btn, .modal-play-btn').forEach(b => b.innerHTML = b.classList.contains('play-btn') ? "▶" : "▶ Play Demo");
            globalAudio.src = url; 
            globalAudio.play(); 
            button.innerHTML = "⏸";
        }
    };
    
    window.triggerSurpriseVb = function() {
        globalAudio.pause();
        if (!sortedVbIds || sortedVbIds.length === 0) return;
        const vbTabBtn = document.querySelector(".nav-menu .nav-btn[onclick*='voicebanks']");
        if (vbTabBtn) switchTab('voicebanks', vbTabBtn);
        const randomCharacterId = sortedVbIds[Math.floor(Math.random() * sortedVbIds.length)];
        openModalVb(randomCharacterId);
    };

    window.reloadModalAfterVote = async function() {
        const titleText = document.getElementById('modalTitle').innerText;
        const charId = titleText.split(' - ')[0];
        await loadVoicebanks();
        if (charId) openModalVb(charId);
    };
</script>
