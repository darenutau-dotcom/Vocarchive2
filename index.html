<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voicebank & Engine Central Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        
        body { 
            background-color: #0b0b0e; 
            color: #e4e4e7; 
            padding-top: 80px; 
            padding-bottom: 40px; 
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        .navbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(11, 11, 14, 0.85); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.04); 
            z-index: 2000; 
            backdrop-filter: blur(12px); 
        }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; }
        .nav-logo { font-size: 1.25rem; font-weight: 800; color: #ffffff; letter-spacing: -0.025em; }
        .nav-logo span { color: #0ea5e9; } 
        .nav-menu { display: flex; gap: 10px; list-style: none; }
        .nav-btn { 
            background: transparent; 
            border: none; 
            color: #a1a1aa; 
            font-size: 0.9rem; 
            font-weight: 600; 
            padding: 8px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .nav-btn:hover { color: #ffffff; background: rgba(255, 255, 255, 0.04); }
        .nav-btn.active { color: #ffffff; background: rgba(14, 165, 233, 0.15); border: 1px solid rgba(14, 165, 233, 0.3); }

        .tab-view { display: none; }
        .tab-view.active { display: grid; }

        .main-layout { display: grid; grid-template-columns: 340px 1fr; gap: 25px; margin-top: 20px; }

        .form-section { 
            background: #121216; 
            padding: 25px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            height: fit-content; 
            position: sticky; 
            top: 100px; 
            transition: all 0.3s; 
        }
        .form-section.editing-mode { border-color: #0ea5e9; box-shadow: 0 10px 25px rgba(14, 165, 233, 0.1); }
        .form-section h2 { margin-bottom: 20px; font-size: 1.15rem; color: #ffffff; font-weight: 700; border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding-bottom: 12px; letter-spacing: -0.01em; }
        .form-section.editing-mode h2 { color: #38bdf8; border-bottom-color: rgba(14, 165, 233, 0.3); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; font-size: 0.9rem; color: #ffffff; transition: all 0.2s; background-color: #1a1a22; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #0ea5e9; background-color: #1a1a22; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        .form-group input::placeholder { color: #52525b; }
        
        .btn-submit { width: 100%; padding: 12px; background: #0ea5e9; color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 0.9rem; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
        .btn-submit:hover { background: #0284c7; transform: translateY(-1px); }
        .btn-submit:disabled { background: #27272a; color: #52525b; cursor: not-allowed; transform: none; }
        
        .btn-cancel-edit { display: none; width: 100%; padding: 10px; background: transparent; color: #a1a1aa; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; margin-top: 8px; text-align: center; transition: all 0.2s; }
        .btn-cancel-edit:hover { background: rgba(255, 255, 255, 0.04); color: #ffffff; }

        .catalog-section { display: flex; flex-direction: column; gap: 25px; }
        .search-container { display: flex; gap: 10px; width: 100%; }
        .search-bar { flex-grow: 1; padding: 14px 24px; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; font-size: 0.95rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); background: #121216; color: #ffffff; transition: all 0.2s; }
        .search-bar:focus { outline: none; border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        .search-bar::placeholder { color: #42424a; }
        .btn-clear-filter { padding: 0 20px; background: #1a1a22; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; font-size: 0.85rem; font-weight: 600; color: #f4f4f5; cursor: pointer; display: none; }
        .btn-clear-filter:hover { background: rgba(255, 255, 255, 0.04); }
        
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        
        .card { 
            background: #121216; 
            border-radius: 16px; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            gap: 16px;
            padding: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            cursor: pointer;
        }
        .card:hover { 
            transform: translateY(-2px); 
            background: #1a1a22; 
            border-color: rgba(14, 165, 233, 0.3); 
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6); 
        }

        .card-img-box { width: 75px; height: 75px; border-radius: 12px; overflow: hidden; background: #0b0b0e; position: relative; flex-shrink: 0; }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .audio-player-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 11, 14, 0.7); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .card-img-box:hover .audio-player-box { opacity: 1; }
        .play-btn { background: #ffffff; border: none; color: #0b0b0e; width: 32px; height: 32px; font-size: 0.9rem; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: transform 0.2s; }
        .play-btn:hover { transform: scale(1.1); background: #0ea5e9; color: white; }

        .card-body { padding: 0; display: flex; flex-direction: column; flex-grow: 1; min-width: 0; }
        .meta-id-tag { font-size: 0.7rem; color: #71717a; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: #ffffff; margin-bottom: 4px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .tag { font-size: 0.65rem; font-weight: 700; padding: 2px 7px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; text-transform: uppercase; color: #a1a1aa; cursor: pointer; transition: all 0.15s; }
        .tag:hover { background: #0ea5e9; color: white; border-color: #0ea5e9; }
        .tag-software { background: rgba(14, 165, 233, 0.06); border-color: rgba(14, 165, 233, 0.15); color: #38bdf8; }
        .tag-software:hover { background: #0ea5e9; color: white; }

        .tag-free { background: rgba(34, 197, 94, 0.06); border-color: rgba(34, 197, 94, 0.15); color: #4ade80; }
        .tag-free:hover { background: #22c55e; color: white; }
        .tag-paid { background: rgba(239, 68, 68, 0.06); border-color: rgba(239, 68, 68, 0.15); color: #f87171; }
        .tag-paid:hover { background: #ef4444; color: white; }
        .tag-freemium { background: rgba(234, 179, 8, 0.06); border-color: rgba(234, 179, 8, 0.15); color: #facc15; }
        .tag-freemium:hover { background: #eab308; color: white; }
        
        .card-action-icon { width: 32px; height: 32px; border-radius: 50%; background: transparent; display: flex; align-items: center; justify-content: center; color: #43434a; flex-shrink: 0; transition: all 0.2s ease; }
        .card:hover .card-action-icon { background: rgba(14, 165, 233, 0.1); color: #0ea5e9; transform: translateX(2px); }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 30px; }
        .page-btn { padding: 10px 16px; border: 1px solid rgba(255, 255, 255, 0.06); background: #121216; cursor: pointer; border-radius: 8px; font-weight: 600; color: #a1a1aa; transition: all 0.2s; }
        .page-btn:hover { border-color: rgba(255, 255, 255, 0.15); background: #1a1a22; color: #ffffff; }
        .page-btn.active { background: #0ea5e9; color: white; border-color: #0ea5e9; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 6, 0.85); justify-content: center; align-items: center; z-index: 3000; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { background: #121216; width: 100%; max-width: 750px; max-height: 85vh; border-radius: 16px; padding: 30px; overflow-y: auto; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 1.8rem; cursor: pointer; color: #52525b; transition: color 0.2s; }
        .close-modal:hover { color: #ffffff; }
        .modal-title { font-size: 1.5rem; margin-bottom: 6px; color: #ffffff; font-weight: 800; letter-spacing: -0.02em; }
        .modal-subtitle { font-size: 0.85rem; color: #71717a; margin-bottom: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding-bottom: 12px; }
        
        audio::-webkit-media-controls-panel { background-color: #1a1a22; }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display { color: #ffffff; }

        .version-item { background: #0b0b0e; border: 1px solid rgba(255, 255, 255, 0.04); padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 20px; position: relative;}
        .version-img { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; background: #121216; border: 1px solid rgba(255, 255, 255, 0.04); flex-shrink: 0; }
        .version-details { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; padding-right: 120px; }
        .version-name { font-weight: 700; font-size: 1.1rem; color: #38bdf8; }
        .modal-play-btn { background: #0ea5e9; color: white; border: none; padding: 7px 14px; font-size: 0.8rem; font-weight: 700; border-radius: 6px; cursor: pointer; width: fit-content; margin-top: 4px; transition: background 0.2s; }
        .modal-play-btn:hover { background: #0284c7; }
        
        .btn-modal-edit { background: transparent; border: 1px solid rgba(255, 255, 255, 0.1); color: #a1a1aa; padding: 6px 12px; font-size: 0.8rem; font-weight: 600; border-radius: 6px; cursor: pointer; margin-top: 4px; transition: all 0.2s; }
        .btn-modal-edit:hover { background: rgba(255, 255, 255, 0.04); color: white; border-color: rgba(255, 255, 255, 0.2); }

        .btn-official-web { position: absolute; right: 20px; bottom: 20px; background: #121216; border: 1px solid rgba(255, 255, 255, 0.08); padding: 8px 14px; font-size: 0.8rem; font-weight: 700; text-decoration: none; color: #cbd5e1; border-radius: 8px; transition: all 0.2s; }
        .btn-official-web:hover { background: #1a1a22; border-color: rgba(255, 255, 255, 0.2); color: #ffffff; }

        .ratings-panel { margin-top: 8px; background: #121216; border: 1px solid rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; max-width: 420px; }
        .rating-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.75rem; color: #a1a1aa; }
        .rating-label { font-weight: 600; min-width: 120px; text-transform: uppercase; letter-spacing: 0.02em; color: #71717a; }
        .rating-bar-container { flex-grow: 1; height: 6px; background: #1a1a22; border-radius: 3px; margin: 0 10px; overflow: hidden; position: relative; }
        .rating-bar-fill { height: 100%; background: #0ea5e9; width: 0%; border-radius: 3px; transition: width 0.5s ease; }
        .rating-value { font-weight: 700; color: #ffffff; width: 24px; text-align: right; }
        
        .rating-slider { width: 100%; margin: 0; cursor: pointer; accent-color: #0ea5e9; height: 6px; background: #1a1a22; border-radius: 3px; }
        .rate-toggle-btn { background: transparent; border: none; color: #0ea5e9; font-size: 0.75rem; font-weight: 700; cursor: pointer; text-decoration: underline; margin-top: 4px; width: fit-content; padding: 0; text-underline-offset: 2px; }
        .rate-toggle-btn:hover { color: #38bdf8; }
        .rate-toggle-btn:disabled { color: #52525b; text-decoration: none; cursor: not-allowed; }
        .btn-submit-vote { background: rgba(14, 165, 233, 0.1); border: 1px solid rgba(14, 165, 233, 0.3); color: #38bdf8; font-size: 0.7 turnaround; font-weight: 700; padding: 4px 10px; border-radius: 4px; cursor: pointer; margin-top: 6px; width: fit-content; transition: all 0.2s; text-transform: uppercase; }
        .btn-submit-vote:hover { background: #0ea5e9; color: white; }

        .btn-floating-feedback {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #0ea5e9; 
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 2500;
            transition: all 0.2s ease-in-out;
        }
        .btn-floating-feedback:hover {
            transform: translateY(-3px) scale(1.03);
            background: #38bdf8;
            box-shadow: 0 15px 25px rgba(14, 165, 233, 0.4);
        }

        /* --- CORRECCIONES RESPONSIVE PREMIUM --- */
        @media (max-width: 900px) { 
            body { padding-top: 140px; }
            .main-layout { grid-template-columns: 1fr; gap: 20px; }
            .form-section { position: relative !important; top: 0 !important; box-shadow: none; }
            .nav-container { flex-direction: column; gap: 12px; padding: 12px 20px; }
        }

        @media (max-width: 600px) {
            .modal-content { padding: 20px 16px; max-height: 90vh; }
            .modal-title { font-size: 1.25rem; }
            
            .version-item { flex-direction: column !important; gap: 18px !important; align-items: center; padding: 16px; }
            .version-item > div { flex-direction: column !important; gap: 14px !important; text-align: center; width: 100%; }
            
            .version-img { width: 120px !important; height: 120px !important; object-fit: contain !important; margin: 0 auto; display: block; border-radius: 10px; }
            
            .version-details { padding-right: 0 !important; align-items: center; width: 100%; }
            .version-details .tags-container { justify-content: center; margin-bottom: 6px; }
            
            .version-details audio { width: 100% !important; max-width: 100% !important; margin-top: 4px; }
            .btn-modal-edit { margin-top: 10px !important; width: 100%; text-align: center; justify-content: center; }
            
            .btn-official-web { position: relative !important; right: 0 !important; bottom: 0 !important; display: block; width: 100%; text-align: center; margin-top: 14px; margin-bottom: 4px; box-sizing: border-box; padding: 11px; }
            
            .ratings-panel { max-width: 100% !important; width: 100%; margin-top: 12px; }
            body { padding-bottom: 90px; }
            .btn-floating-feedback { padding: 10px 16px; font-size: 0.8rem; bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">VocalArchive<span>.db</span></div>
        <ul class="nav-menu">
            <li><button class="nav-btn active">Voicebanks</button></li>
            <li><button class="nav-btn" onclick="triggerSurpriseVb()" style="color: #facc15; font-weight: 800;">🎲 Surprise Me</button></li>
        </ul>
    </div>
</nav>

<div class="container">

    <div id="view-voicebanks" class="tab-view main-layout active">
        <aside class="form-section" id="vbFormContainer">
            <h2 id="vbFormTitle">Upload Voicebank</h2>
            <form id="voicebankForm">
                <input type="hidden" id="editingVersionId" value="">
                
                <div class="form-group">
                    <label for="vbId">Character ID (e.g., MIKU, IA):</label>
                    <input type="text" id="vbId" placeholder="e.g., MIKU" required style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label for="vbName">Version Name / Append:</label>
                    <input type="text" id="vbName" placeholder="e.g., Hatsune Miku V4X Dark" required>
                </div>
                <div class="form-group">
                    <label for="vbDemo">Demo Song URL (Audio) <span style="color:#52525b; font-size:0.75rem;">(Optional)</span>:</label>
                    <input type="url" id="vbDemo" placeholder="https://example.com/audio.mp3">
                </div>
                <div class="form-group">
                    <label for="vbImg">Version Image URL:</label>
                    <input type="url" id="vbImg" placeholder="https://example.com/image.jpg" required>
                </div>
                <div class="form-group">
                    <label for="vbLang">Language(s) (Comma separated):</label>
                    <input type="text" id="vbLang" placeholder="e.g., Japanese, English" required>
                </div>
                <div class="form-group">
                    <label for="vbSoftware">Software / Engine (Comma separated):</label>
                    <input type="text" id="vbSoftware" placeholder="e.g., VOCALOID6, Synthesizer V" required>
                </div>
                <div class="form-group">
                    <label for="vbGenres">Optimal Genres / Styles (Comma separated):</label>
                    <input type="text" id="vbGenres" placeholder="e.g., Pop, Metal, J-Rock">
                </div>
                <div class="form-group">
                    <label for="vbDate">Release Date:</label>
                    <input type="date" id="vbDate" required>
                </div>
                <div class="form-group">
                    <label for="vbGender">Voice Gender:</label>
                    <select id="vbGender">
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                        <option value="Both / Other">Both / Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vbWeb">Official Website (URL):</label>
                    <input type="url" id="vbWeb" placeholder="https://..." required>
                </div>
                <button type="submit" id="btnSubmitVb" class="btn-submit">Register Version</button>
                <button type="button" id="btnCancelVbEdit" class="btn-cancel-edit" onclick="cancelVbEditing()">Cancel Edit</button>
            </form>
        </aside>

        <main class="catalog-section">
            <div class="search-container">
                <input type="text" id="searchBarVb" class="search-bar" placeholder="Search by character, version, languages, engines, genres...">
                <button id="btnClearFilterVb" class="btn-clear-filter" onclick="clearFilter('vb')">Clear Filter</button>
            </div>
            <div id="catalogGridVb" class="catalog-grid"></div>
            <div id="paginationVb" class="pagination"></div>
        </main>
    </div>

</div>

<div id="globalModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" class="modal-title">Log History</h2>
        <p id="modalSubtitle" class="modal-subtitle">Sub</p>
        <div id="modalList"></div>
    </div>
</div>

<audio id="globalAudioPlayer"></audio>

<script>
    const SUPABASE_URL = "https://zkurztyywzcsnfhtzavp.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprdXJ6dHl5d3pjc25maHR6YXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjIxNjcsImV4cCI6MjA5NTMzODE2N30.iFetb5DZhsbGmRlYaE-HiG9TF8rJaIV6s9jsM5C07jc";
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const itemsPerPage = 12;
    
    let localVbData = {}, sortedVbIds = [], filteredVbIds = [], currentPageVb = 1;
    let cachedRatings = {}; 
    let isEditingVb = false; 

    const globalAudio = document.getElementById('globalAudioPlayer');

    async function loadGlobalRatings() {
        try {
            const { data, error } = await _supabase.from('calificaciones').select('version_id, quality, clarity, usability, versatility');
            if (error) return;
            
            let accum = {};
            data.forEach(r => {
                if(!accum[r.version_id]) accum[r.version_id] = { quality: 0, clarity: 0, usability: 0, versatility: 0, count: 0 };
                accum[r.version_id].quality += r.quality;
                accum[r.version_id].clarity += r.clarity;
                accum[r.version_id].usability += r.usability;
                accum[r.version_id].versatility += r.versatility;
                accum[r.version_id].count += 1;
            });

            cachedRatings = {};
            Object.keys(accum).forEach(vId => {
                let totalVotes = accum[vId].count;
                let avgQ = accum[vId].quality / totalVotes;
                let avgC = accum[vId].clarity / totalVotes;
                let avgU = accum[vId].usability / totalVotes;
                let avgV = accum[vId].versatility / totalVotes;
                let globalAvg = (avgQ + avgC + avgU + avgV) / 4;

                cachedRatings[vId] = {
                    quality: avgQ.toFixed(1),
                    clarity: avgC.toFixed(1),
                    usability: avgU.toFixed(1),
                    versatility: avgV.toFixed(1),
                    global: globalAvg.toFixed(1),
                    count: totalVotes
                };
            });
        } catch(e) { console.error(e); }
    }

    async function loadVoicebanks() {
        await loadGlobalRatings();
        const { data, error } = await _supabase.from('personajes').select(`id, gender, versiones ( id, name, demo, img, lang, software, genres, date, web, created_at )`);
        if (error) return console.error(error.message);

        localVbData = {};
        data.forEach(char => {
            if(char.versiones && char.versiones.length > 0) {
                const sortedVersions = char.versiones.sort((a, b) => new Date(a.date) - new Date(b.date));
                let displayGender = (char.gender === "Femenino" || char.gender === "Female") ? "Female" : (char.gender === "Masculino" || char.gender === "Male" ? "Male" : "Other");
                localVbData[char.id] = { id: char.id, gender: displayGender, versions: sortedVersions, latestReleaseDate: new Date(sortedVersions[sortedVersions.length - 1].date) };
            }
        });
        sortedVbIds = Object.keys(localVbData).sort((a, b) => localVbData[b].latestReleaseDate - localVbData[a].latestReleaseDate);
        applyFilterVb();
    }

    document.getElementById('voicebankForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmitVb');
        btn.disabled = true; btn.innerText = "Saving...";
        const idInput = document.getElementById('vbId').value.trim().toUpperCase();
        
        try {
            const { error: charError } = await _supabase.from('personajes').upsert({ id: idInput, gender: document.getElementById('vbGender').value });
            if (charError) throw new Error(charError.message);
            
            const versionPayload = {
                personaje_id: idInput, name: document.getElementById('vbName').value, 
                demo: document.getElementById('vbDemo').value.trim() || "",
                img: document.getElementById('vbImg').value, lang: document.getElementById('vbLang').value,
                software: document.getElementById('vbSoftware').value, genres: document.getElementById('vbGenres').value, 
                date: document.getElementById('vbDate').value, web: document.getElementById('vbWeb').value
            };

            if (isEditingVb) {
                versionPayload.id = parseInt(document.getElementById('editingVersionId').value);
                await _supabase.from('versiones').upsert(versionPayload);
                cancelVbEditing();
            } else {
                await _supabase.from('versiones').insert(versionPayload);
                document.getElementById('voicebankForm').reset();
            }
            await loadVoicebanks();
            alert("¡Voicebank guardado!");
        } catch (x) { alert(x.message); } finally { btn.disabled = false; btn.innerText = isEditingVb ? "Update Version" : "Register Version"; }
    });

    window.startVbEditDirect = function(charId, versionId) {
        const char = localVbData[charId]; const targetedVersion = char.versions.find(v => v.id === versionId);
        if (!targetedVersion) return;
        isEditingVb = true;
        const container = document.getElementById('vbFormContainer'); container.classList.add('editing-mode');
        document.getElementById('vbFormTitle').innerText = `⚠️ Editing: ${charId}`;
        document.getElementById('btnSubmitVb').innerText = "Update Version";
        document.getElementById('btnCancelVbEdit').style.display = "block";
        document.getElementById('editingVersionId').value = targetedVersion.id;
        document.getElementById('vbId').value = char.id;
        document.getElementById('vbName').value = targetedVersion.name;
        document.getElementById('vbDemo').value = targetedVersion.demo || "";
        document.getElementById('vbImg').value = targetedVersion.img;
        document.getElementById('vbLang').value = targetedVersion.lang;
        document.getElementById('vbSoftware').value = targetedVersion.software;
        document.getElementById('vbGenres').value = targetedVersion.genres || "";
        document.getElementById('vbDate').value = targetedVersion.date;
        document.getElementById('vbGender').value = char.gender;
        document.getElementById('vbWeb').value = targetedVersion.web;
        closeModal(); container.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
    };

    window.cancelVbEditing = function() {
        isEditingVb = false;
        document.getElementById('vbFormContainer').classList.remove('editing-mode');
        document.getElementById('vbFormTitle').innerText = "Upload Voicebank";
        document.getElementById('btnSubmitVb').innerText = "Register Version";
        document.getElementById('btnCancelVbEdit').style.display = "none";
        document.getElementById('voicebankForm').reset();
    };

    function renderCatalogVb(page) {
        const grid = document.getElementById('catalogGridVb'); grid.innerHTML = "";
        if (filteredVbIds.length === 0) { grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:40px; color:#52525b;'>No voicebanks found.</p>"; return; }

        let paginated = filteredVbIds.slice((page - 1) * itemsPerPage, page * itemsPerPage);
        paginated.forEach(id => {
            const char = localVbData[id]; const latest = char.versions[char.versions.length - 1];
            const audioBoxHtml = (latest.demo && latest.demo.trim() !== "") ? `<div class="audio-player-box"><button class="play-btn" onclick="event.stopPropagation(); playAudio('${latest.demo}', this)">▶</button></div>` : '';
            const ratingCache = cachedRatings[latest.id];
            const ratingTextHtml = ratingCache ? `<span style="color:#facc15; font-weight:700; margin-left: 8px;">★ ${ratingCache.global}</span>` : '';

            const card = document.createElement('article'); card.className = 'card'; card.setAttribute('onclick', `openModalVb('${char.id}')`);
            card.innerHTML = `
                <div class="card-img-box"><img src="${latest.img}">${audioBoxHtml}</div>
                <div class="card-body">
                    <span class="meta-id-tag">${char.id} (${char.versions.length})</span>
                    <h3 class="card-title">${latest.name}</h3>
                    <div class="meta-line" style="font-size: 0.75rem; color:#71717a; margin-bottom: 2px;">Update: ${latest.date}${ratingTextHtml}</div>
                    <div class="tags-container">
                        ${latest.lang.split(',').slice(0,2).map(l => `<span class="tag" onclick="event.stopPropagation(); filterTagVb('${l.trim()}');">${l.trim()}</span>`).join('')}
                        ${latest.software.split(',').slice(0,1).map(s => `<span class="tag tag-software" onclick="event.stopPropagation(); filterTagVb('${s.trim()}');">${s.trim()}</span>`).join('')}
                    </div>
                </div>
                <div class="card-action-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>`;
            grid.appendChild(card);
        });
        renderPaginationUI('paginationVb', filteredVbIds.length, page, (p) => { currentPageVb = p; renderCatalogVb(p); });
    }

    function applyFilterVb() {
        const query = document.getElementById('searchBarVb').value.toLowerCase().trim();
        document.getElementById('btnClearFilterVb').style.display = query ? "block" : "none";
        filteredVbIds = sortedVbIds.filter(id => {
            const c = localVbData[id];
            return c.id.toLowerCase().includes(query) || c.gender.toLowerCase().includes(query) || c.versions.some(v => v.name.toLowerCase().includes(query) || v.software.toLowerCase().includes(query) || v.lang.toLowerCase().includes(query) || (v.genres && v.genres.toLowerCase().includes(query)));
        });
        currentPageVb = 1; renderCatalogVb(currentPageVb);
    }
    
    window.filterTagVb = function(t) { 
        const searchBar = document.getElementById('searchBarVb');
        searchBar.value = t; applyFilterVb(); searchBar.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };
    document.getElementById('searchBarVb').addEventListener('input', applyFilterVb);

    function renderPaginationUI(containerId, totalItems, activePage, callback) {
        const container = document.getElementById(containerId); container.innerHTML = "";
        const pages = Math.ceil(totalItems / itemsPerPage); if (pages <= 1) return;
        for (let i = 1; i <= pages; i++) {
            const btn = document.createElement('button'); btn.className = `page-btn ${i === activePage ? 'active' : ''}`; btn.innerText = i;
            btn.onclick = () => { callback(i); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            container.appendChild(btn);
        }
    }

    window.clearFilter = function(mode) {
        if (mode === 'vb') { document.getElementById('searchBarVb').value = ""; applyFilterVb(); }
    };

    window.openModalVb = function(id) {
        globalAudio.pause();
        const c = localVbData[id]; const modal = document.getElementById('globalModal');
        document.getElementById('modalTitle').innerText = `${id} - Archival Logs`;
        document.getElementById('modalSubtitle').innerText = `Total alternative configurations: ${c.versions.length}`;
        const list = document.getElementById('modalList'); list.innerHTML = "";
        
        [...c.versions].reverse().forEach(v => {
            const modalPlayBtnHtml = (v.demo && v.demo.trim() !== "") ? `
                <div style="margin-top: 6px; width: 100%; max-width: 280px;">
                    <audio controls src="${v.demo}" style="width: 100%; height: 32px; border-radius: 8px; background: #1a1a22;"></audio>
                </div>` : '';
                
            const rateData = cachedRatings[v.id] || { quality: 0, clarity: 0, usability: 0, versatility: 0, global: "0.0", count: 0 };
            const hasVotedLocal = localStorage.getItem(`voted_v_${v.id}`);
            const btnText = hasVotedLocal ? "[ You already evaluated this bank ]" : "[ Evaluate this bank ]";
            const btnDisabledAttr = hasVotedLocal ? "disabled" : "";

            const isDownloadLink = v.web.includes('drive.google') || v.web.includes('mega.nz') || v.web.includes('github') || v.software.toLowerCase().includes('utau');
            const actionButtonText = isDownloadLink ? "📥 Download Voicebank" : "🌐 Official Site ↗";

            list.innerHTML += `
                <div class="version-item" style="flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 20px; width: 100%;">
                        <img class="version-img" src="${v.img}">
                        <div class="version-details">
                            <div class="version-name">${v.name}</div>
                            
                            <div class="tags-container" style="margin-bottom: 4px; margin-top: 2px;">
                                ${v.software.split(',').map(s => `<span class="tag tag-software" onclick="event.stopPropagation(); closeModal(); filterTagVb('${s.trim()}');">${s.trim()}</span>`).join('')}
                                ${v.lang.split(',').map(l => `<span class="tag" onclick="event.stopPropagation(); closeModal(); filterTagVb('${l.trim()}');">${l.trim()}</span>`).join('')}
                                ${v.genres ? v.genres.split(',').map(g => `<span class="tag" style="background: rgba(168, 85, 247, 0.06); border-color: rgba(168, 85, 247, 0.15); color: #c084fc;" onclick="event.stopPropagation(); closeModal(); filterTagVb('${g.trim()}');">${g.trim()}</span>`).join('') : ''}
                            </div>

                            <div class="meta-line"><strong>Release Date:</strong> ${v.date} | <strong>Gender:</strong> ${c.gender}</div>
                            
                            <div style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 4px; width: 100%;">
                                ${modalPlayBtnHtml}
                                <button class="btn-modal-edit" style="height: 32px; margin-top: 6px;" onclick="startVbEditDirect('${id}', ${v.id})">✏️ Edit This</button>
                            </div>
                        </div>
                        <a href="${v.web}" target="_blank" class="btn-official-web">${actionButtonText}</a>
                    </div>
                    
                    <div class="ratings-panel" id="ratePanel-${v.id}">
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.02); padding-bottom:4px; margin-bottom:2px;">
                            <span style="font-size:0.75rem; font-weight:700; color:#ffffff;">📊 COMMUNITY EVALUATION (★ ${rateData.global})</span>
                            <span style="font-size:0.65rem; color:#71717a;">${rateData.count} review(s)</span>
                        </div>
                        <div id="rateDisplayContainer-${v.id}" style="display:flex; flex-direction:column; gap:6px;">
                            <div class="rating-row">
                                <span class="rating-label">Vocal Quality</span>
                                <div class="rating-bar-container"><div class="rating-bar-fill" style="width:${rateData.quality * 20}%"></div></div>
                                <span class="rating-value">${rateData.quality}</span>
                            </div>
                            <div class="rating-row">
                                <span class="rating-label">Intelligibility</span>
                                <div class="rating-bar-container"><div class="rating-bar-fill" style="width:${rateData.clarity * 20}%"></div></div>
                                <span class="rating-value">${rateData.clarity}</span>
                            </div>
                            <div class="rating-row">
                                <span class="rating-label">Usability</span>
                                <div class="rating-bar-container"><div class="rating-bar-fill" style="width:${rateData.usability * 20}%"></div></div>
                                <span class="rating-value">${rateData.usability}</span>
                            </div>
                            <div class="rating-row">
                                <span class="rating-label">Versatility</span>
                                <div class="rating-bar-container"><div class="rating-bar-fill" style="width:${rateData.versatility * 20}%"></div></div>
                                <span class="rating-value">${rateData.versatility}</span>
                            </div>
                            <button class="rate-toggle-btn" ${btnDisabledAttr} onclick="toggleRateMode(${v.id})">${btnText}</button>
                        </div>
                    </div>
                </div>`;
        });
        modal.style.display = "flex";
    };

    window.toggleRateMode = function(versionId) {
        const container = document.getElementById(`rateDisplayContainer-${versionId}`);
        container.innerHTML = `
            <div class="rating-row">
                <span class="rating-label">Vocal Quality</span>
                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sl-q-${versionId}" oninput="document.getElementById('vl-q-${versionId}').innerText=this.value">
                <span class="rating-value" id="vl-q-${versionId}">5</span>
            </div>
            <div class="rating-row">
                <span class="rating-label">Intelligibility</span>
                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sl-c-${versionId}" oninput="document.getElementById('vl-c-${versionId}').innerText=this.value">
                <span class="rating-value" id="vl-c-${versionId}">5</span>
            </div>
            <div class="rating-row">
                <span class="rating-label">Usability</span>
                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sl-u-${versionId}" oninput="document.getElementById('vl-u-${versionId}').innerText=this.value">
                <span class="rating-value" id="vl-u-${versionId}">5</span>
            </div>
            <div class="rating-row">
                <span class="rating-label">Versatility</span>
                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sl-v-${versionId}" oninput="document.getElementById('vl-v-${versionId}').innerText=this.value">
                <span class="rating-value" id="vl-v-${versionId}">5</span>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="btn-submit-vote" id="btnVote-${versionId}" onclick="submitRating(${versionId})">[ Submit Evaluation ]</button>
                <button class="rate-toggle-btn" style="margin-top:6px;" onclick="reloadModalAfterVote()">[ Cancel ]</button>
            </div>`;
    };

    window.submitRating = async function(versionId) {
        const actionBtn = document.getElementById(`btnVote-${versionId}`);
        actionBtn.disabled = true; actionBtn.innerText = "[ Securing Connection... ]";

        let clientIp = "0.0.0.0";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            if(data && data.ip) clientIp = data.ip;
        } catch(ipErr) { console.warn("Fallo al resolver IP."); }

        const q = parseInt(document.getElementById(`sl-q-${versionId}`).value);
        const c = parseInt(document.getElementById(`sl-c-${versionId}`).value);
        const u = parseInt(document.getElementById(`sl-u-${versionId}`).value);
        const v = parseInt(document.getElementById(`sl-v-${versionId}`).value);

        const { error } = await _supabase.from('calificaciones').insert({
            version_id: versionId, quality: q, clarity: c, usability: u, versatility: v, user_ip: clientIp
        });

        if (error) {
            actionBtn.disabled = false; actionBtn.innerText = "[ Submit Evaluation ]";
            if(error.code === "23505") {
                alert("🔒 Error de Seguridad: Tu dirección IP ya ha registrado un voto para este banco de voz hoy.");
                localStorage.setItem(`voted_v_${versionId}`, "true"); reloadModalAfterVote();
            } else { alert("No se pudo guardar: " + error.message); }
        } else {
            localStorage.setItem(`voted_v_${versionId}`, "true");
            alert("¡Evaluación técnica procesada y firmada con éxito!");
            reloadModalAfterVote();
        }
    };

    window.closeModal = function() { document.getElementById('globalModal').style.display = "none"; globalAudio.pause(); };

    window.playAudio = function(url, button) {
        if (globalAudio.src === url && !globalAudio.paused) { globalAudio.pause(); button.innerHTML = button.classList.contains('play-btn') ? "▶" : "▶ Play Demo"; } 
        else {
            document.querySelectorAll('.play-btn, .modal-play-btn').forEach(b => b.innerHTML = b.classList.contains('play-btn') ? "▶" : "▶ Play Demo");
            globalAudio.src = url; globalAudio.play(); button.innerHTML = "⏸";
        }
    };
    
    window.triggerSurpriseVb = function() {
        globalAudio.pause();
        if (!sortedVbIds || sortedVbIds.length === 0) return;
        const randomCharacterId = sortedVbIds[Math.floor(Math.random() * sortedVbIds.length)];
        openModalVb(randomCharacterId);
    };

    window.reloadModalAfterVote = async function() {
        const titleText = document.getElementById('modalTitle').innerText;
        const charId = titleText.split(' - ')[0];
        await loadVoicebanks();
        if(charId) openModalVb(charId);
    };

    loadVoicebanks();
</script>
