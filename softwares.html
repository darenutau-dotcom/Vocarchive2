<script>
    // USANDO TUS MISMAS CREDENCIALES DE SUPABASE EXACTAS
    const SUPABASE_URL = "https://zkurztyywzcsnfhtzavp.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprdXJ6dHl5d3pjc25maHR6YXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjIxNjcsImV4cCI6MjA5NTMzODE2N30.iFetb5DZhsbGmRlYaE-HiG9TF8rJaIV6s9jsM5C07jc";
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const itemsPerPage = 12;
    
    let localSwData = {}, sortedSwIds = [], filteredSwIds = [], currentPageSw = 1;
    let cachedSwRatings = {}; 
    let isEditingSw = false; 

    // Adaptado a la tabla de calificaciones de software
    async function loadGlobalSwRatings() {
        try {
            const { data, error } = await _supabase.from('calificaciones_software').select('version_id, rendimiento, interfaz, estabilidad, caracteristicas');
            if (error) return;
            
            let accum = {};
            data.forEach(r => {
                if(!accum[r.version_id]) accum[r.version_id] = { rend: 0, intf: 0, estab: 0, feat: 0, count: 0 };
                accum[r.version_id].rend += r.rendimiento;
                accum[r.version_id].intf += r.interfaz;
                accum[r.version_id].estab += r.estabilidad;
                accum[r.version_id].feat += r.caracteristicas;
                accum[r.version_id].count += 1;
            });

            cachedSwRatings = {};
            Object.keys(accum).forEach(vId => {
                let totalVotes = accum[vId].count;
                let avgR = accum[vId].rend / totalVotes;
                let avgI = accum[vId].intf / totalVotes;
                let avgE = accum[vId].estab / totalVotes;
                let avgF = accum[vId].feat / totalVotes;
                let globalAvg = (avgR + avgI + avgE + avgF) / 4;

                cachedSwRatings[vId] = {
                    rendimiento: avgR.toFixed(1),
                    interfaz: avgI.toFixed(1),
                    estabilidad: avgE.toFixed(1),
                    caracteristicas: avgF.toFixed(1),
                    global: globalAvg.toFixed(1),
                    count: totalVotes
                };
            });
        } catch(e) { console.error(e); }
    }

    async function loadSoftwares() {
        await loadGlobalSwRatings();
        // Mapea la tabla 'softwares' y su relación con 'versiones_software'
        const { data, error } = await _supabase.from('softwares').select(`id, precio, versiones_software ( id, name, img, developer, platform, date, web, created_at )`);
        if (error) return console.error(error.message);

        localSwData = {};
        data.forEach(sw => {
            if(sw.versiones_software && sw.versiones_software.length > 0) {
                const sortedVersions = sw.versiones_software.sort((a, b) => new Date(a.date) - new Date(b.date));
                localSwData[sw.id] = { id: sw.id, precio: sw.precio, versions: sortedVersions, latestReleaseDate: new Date(sortedVersions[sortedVersions.length - 1].date) };
            }
        });
        sortedSwIds = Object.keys(localSwData).sort((a, b) => localSwData[b].latestReleaseDate - localSwData[a].latestReleaseDate);
        applyFilterSw();
    }

    document.getElementById('softwareForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmitSw');
        btn.disabled = true; btn.innerText = "Saving...";
        const idInput = document.getElementById('swId').value.trim().toUpperCase();
        
        try {
            await _supabase.from('softwares').upsert({ id: idInput, precio: document.getElementById('swPrice').value });
            
            const versionPayload = {
                software_id: idInput, name: document.getElementById('swName').value, 
                img: document.getElementById('swImg').value, developer: document.getElementById('swDeveloper').value,
                platform: document.getElementById('swPlatform').value, date: document.getElementById('swDate').value, 
                web: document.getElementById('swWeb').value
            };

            if (isEditingSw) {
                versionPayload.id = parseInt(document.getElementById('editingSwVersionId').value);
                await _supabase.from('versiones_software').upsert(versionPayload);
                cancelSwEditing();
            } else {
                await _supabase.from('versiones_software').insert(versionPayload);
                document.getElementById('softwareForm').reset();
            }
            await loadSoftwares();
            alert("¡Software guardado con éxito!");
        } catch (x) { alert(x.message); } finally { btn.disabled = false; btn.innerText = isEditingSw ? "Update Version" : "Register Software"; }
    });

    window.startSwEditDirect = function(swId, versionId) {
        const sw = localSwData[swId]; const targetedVersion = sw.versions.find(v => v.id === versionId);
        if (!targetedVersion) return;
        isEditingSw = true;
        const container = document.getElementById('swFormContainer'); container.classList.add('editing-mode');
        document.getElementById('swFormTitle').innerText = `⚠️ Editing Engine: ${swId}`;
        document.getElementById('btnSubmitSw').innerText = "Update Version";
        document.getElementById('btnCancelSwEdit').style.display = "block";
        document.getElementById('editingSwVersionId').value = targetedVersion.id;
        document.getElementById('swId').value = sw.id;
        document.getElementById('swName').value = targetedVersion.name;
        document.getElementById('swImg').value = targetedVersion.img;
        document.getElementById('swDeveloper').value = targetedVersion.developer;
        document.getElementById('swPlatform').value = targetedVersion.platform;
        document.getElementById('swDate').value = targetedVersion.date;
        document.getElementById('swPrice').value = sw.precio;
        document.getElementById('swWeb').value = targetedVersion.web;
        closeModal(); container.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
    };

    window.cancelSwEditing = function() {
        isEditingSw = false;
        document.getElementById('swFormContainer').classList.remove('editing-mode');
        document.getElementById('swFormTitle').innerText = "Upload Software";
        document.getElementById('btnSubmitSw').innerText = "Register Software";
        document.getElementById('btnCancelSwEdit').style.display = "none";
        document.getElementById('softwareForm').reset();
    };

    function renderCatalogSw(page) {
        const grid = document.getElementById('catalogGridSw'); grid.innerHTML = "";
        if (filteredSwIds.length === 0) { grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:40px; color:#52525b;'>No engines found.</p>"; return; }

        let paginated = filteredSwIds.slice((page - 1) * itemsPerPage, page * itemsPerPage);
        paginated.forEach(id => {
            const sw = localSwData[id]; const latest = sw.versions[sw.versions.length - 1];
            const ratingCache = cachedSwRatings[latest.id];
            const ratingTextHtml = ratingCache ? `<span style="color:#facc15; font-weight:700; margin-left: 8px;">★ ${ratingCache.global}</span>` : '';
            const priceClass = sw.precio.toLowerCase() === 'free' ? 'tag-free' : 'tag-paid';

            const card = document.createElement('article'); card.className = 'card'; card.setAttribute('onclick', `openModalSw('${sw.id}')`);
            card.innerHTML = `
                <div class="card-img-box"><img src="${latest.img}"></div>
                <div class="card-body">
                    <span class="meta-id-tag">${sw.id} (${sw.versions.length})</span>
                    <h3 class="card-title">${latest.name}</h3>
                    <div class="meta-line" style="font-size: 0.75rem; color:#71717a; margin-bottom: 2px;">Released: ${latest.date}${ratingTextHtml}</div>
                    <div class="tags-container">
                        <span class="tag tag-engine" onclick="event.stopPropagation(); filterTagSw('${latest.developer}');">${latest.developer}</span>
                        <span class="tag ${priceClass}">${sw.precio}</span>
                    </div>
                </div>
                <div class="card-action-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>`;
            grid.appendChild(card);
        });
        renderPaginationUI('paginationSw', filteredSwIds.length, page, (p) => { currentPageSw = p; renderCatalogSw(p); });
    }

    function applyFilterSw() {
        const query = document.getElementById('searchBarSw').value.toLowerCase().trim();
        document.getElementById('btnClearFilterSw').style.display = query ? "block" : "none";
        filteredSwIds = sortedSwIds.filter(id => {
            const sw = localSwData[id];
            return sw.id.toLowerCase().includes(query) || sw.precio.toLowerCase().includes(query) || sw.versions.some(v => v.name.toLowerCase().includes(query) || v.developer.toLowerCase().includes(query) || v.platform.toLowerCase().includes(query));
        });
        currentPageSw = 1; renderCatalogSw(currentPageSw);
    }
    
    window.filterTagSw = function(t) { 
        const searchBar = document.getElementById('searchBarSw');
        searchBar.value = t; applyFilterSw(); searchBar.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };
    document.getElementById('searchBarSw').addEventListener('input', applyFilterSw);

    function renderPaginationUI(containerId, totalItems, activePage, callback) {
        const container = document.getElementById(containerId); container.innerHTML = "";
        const pages = Math.ceil(totalItems / itemsPerPage); if (pages <= 1) return;
        for (let i = 1; i <= pages; i++) {
            const btn = document.createElement('button'); btn.className = `page-btn ${i === activePage ? 'active' : ''}`; btn.innerText = i;
            btn.onclick = () => { callback(i); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            container.appendChild(btn);
        }
    }

    window.clearFilter = function(mode) {
        if (mode === 'sw') { document.getElementById('searchBarSw').value = ""; applyFilterSw(); }
    };

    window.openModalSw = function(id) {
        const sw = localSwData[id]; const modal = document.getElementById('globalModal');
        document.getElementById('modalTitle').innerText = `${id} - Architecture Logs`;
        document.getElementById('modalSubtitle').innerText = `Total sub-releases/editions: ${sw.versions.length}`;
        const list = document.getElementById('modalList'); list.innerHTML = "";
        
        [...sw.versions].reverse().forEach(v => {
            const rateData = cachedSwRatings[v.id] || { rendimiento: 0, interfaz: 0, estabilidad: 0, caracteristicas: 0, global: "0.0", count: 0 };
            const hasVotedLocal = localStorage.getItem(`voted_sw_${v.id}`);
            const btnText = hasVotedLocal ? "[ Already Evaluated ]" : "[ Evaluate Engine Performance ]";
            const btnDisabledAttr = hasVotedLocal ? "disabled" : "";

            list.innerHTML += `
                <div class="version-item" style="flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 20px; width: 100%;">
                        <img class="version-img" src="${v.img}">
                        <div class="version-details">
                            <div class="version-name">${v.name}</div>
                            
                            <div class="tags-container" style="margin-bottom: 4px; margin-top: 2px;">
                                <span class="tag tag-engine" onclick="event.stopPropagation(); closeModal(); filterTagSw('${v.developer}');">${v.developer}</span>
                                ${v.platform.split(',').map(p => `<span class="tag" onclick="event.stopPropagation(); closeModal(); filterTagSw('${p.trim()}');">${p.trim()}</span>`).join('')}
                            </div>

                            <div class="meta-line"><strong>Launch Date:</strong> ${v.date} | <strong>Licensing:</strong> ${sw.precio}</div>
                            
                            <button class="btn-modal-edit" style="height: 32px; width: fit-content;" onclick="startSwEditDirect('${id}', ${v.id})">✏️ Edit Specification</button>
                        </div>
                        <a href="${v.web}" target="_blank" class="btn-official-web">🌐 Access Workspace ↗</a>
                    </div>
                    
                    <div class="ratings-panel" id="ratePanelSw-${v.id}">
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.02); padding-bottom:4px; margin-bottom:2px;">
                            <span style="font-size:0.75rem; font-weight:700; color:#ffffff;">📊 PERFORMANCE METRICS (★ ${rateData.global})</span>
                            <span style="font-size:0.65rem; color:#71717a;">${rateData.count} assessment(s)</span>
                        </div>
                        <div id="rateDisplayContainerSw-${v.id}" style="display:flex; flex-direction:column; gap:6px;">
                            <div class="rating-row">
                                <span class="rating-label">Rendimiento (CPU)</span>
                                <div class="rating-bar-container"><div class="rating-bar-fill" style="width:${rateData.rendimiento * 20}%"></div></div>
                                <span class="rating-value">${rateData.rendimiento}</span>
                            </div>
                            <div class="rating-row">
                                <span class="rating-label">Diseño Interfaz</span>
                                <div class="rating-bar-container"><div class="rating-bar-fill" style="width:${rateData.interfaz * 20}%"></div></div>
                                <span class="rating-value">${rateData.interfaz}</span>
                            </div>
                            <div class="rating-row">
                                <span class="rating-label">Estabilidad</span>
                                <div class="rating-bar-container"><div class="rating-bar-fill" style="width:${rateData.estabilidad * 20}%"></div></div>
                                <span class="rating-value">${rateData.estabilidad}</span>
                            </div>
                            <div class="rating-row">
                                <span class="rating-label">Herramientas/Features</span>
                                <div class="rating-bar-container"><div class="rating-bar-fill" style="width:${rateData.caracteristicas * 20}%"></div></div>
                                <span class="rating-value">${rateData.caracteristicas}</span>
                            </div>
                            <button class="rate-toggle-btn" ${btnDisabledAttr} onclick="toggleSwRateMode(${v.id})">${btnText}</button>
                        </div>
                    </div>
                </div>`;
        });
        modal.style.display = "flex";
    };

    window.toggleSwRateMode = function(versionId) {
        const container = document.getElementById(`rateDisplayContainerSw-${versionId}`);
        container.innerHTML = `
            <div class="rating-row">
                <span class="rating-label">Rendimiento</span>
                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sl-r-${versionId}" oninput="document.getElementById('vl-r-${versionId}').innerText=this.value">
                <span class="rating-value" id="vl-r-${versionId}">5</span>
            </div>
            <div class="rating-row">
                <span class="rating-label">Interfaz</span>
                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sl-i-${versionId}" oninput="document.getElementById('vl-i-${versionId}').innerText=this.value">
                <span class="rating-value" id="vl-i-${versionId}">5</span>
            </div>
            <div class="rating-row">
                <span class="rating-label">Estabilidad</span>
                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sl-e-${versionId}" oninput="document.getElementById('vl-e-${versionId}').innerText=this.value">
                <span class="rating-value" id="vl-e-${versionId}">5</span>
            </div>
            <div class="rating-row">
                <span class="rating-label">Herramientas</span>
                <input type="range" min="1" max="5" value="5" class="rating-slider" id="sl-f-${versionId}" oninput="document.getElementById('vl-f-${versionId}').innerText=this.value">
                <span class="rating-value" id="vl-f-${versionId}">5</span>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="btn-submit-vote" id="btnVoteSw-${versionId}" onclick="submitSwRating(${versionId})">[ Submit Evaluation ]</button>
                <button class="rate-toggle-btn" style="margin-top:6px;" onclick="reloadSwModalAfterVote()">[ Cancel ]</button>
            </div>`;
    };

    window.submitSwRating = async function(versionId) {
        const actionBtn = document.getElementById(`btnVoteSw-${versionId}`);
        actionBtn.disabled = true; actionBtn.innerText = "[ Securing Space... ]";

        let clientIp = "0.0.0.0";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            if(data && data.ip) clientIp = data.ip;
        } catch(ipErr) { console.warn("Fallo IP."); }

        const r = parseInt(document.getElementById(`sl-r-${versionId}`).value);
        const i = parseInt(document.getElementById(`sl-i-${versionId}`).value);
        const e = parseInt(document.getElementById(`sl-e-${versionId}`).value);
        const f = parseInt(document.getElementById(`sl-f-${versionId}`).value);

        const { error } = await _supabase.from('calificaciones_software').insert({
            version_id: versionId, rendimiento: r, interfaz: i, estabilidad: e, caracteristicas: f, user_ip: clientIp
        });

        if (error) {
            actionBtn.disabled = false; actionBtn.innerText = "[ Submit Evaluation ]";
            if(error.code === "23505") {
                alert("🔒 IP Protegida: Ya has registrado una evaluación para esta edición el día de hoy.");
                localStorage.setItem(`voted_sw_${versionId}`, "true"); reloadSwModalAfterVote();
            } else { alert("Error: " + error.message); }
        } else {
            localStorage.setItem(`voted_sw_${versionId}`, "true");
            alert("¡Métricas de software añadidas con éxito!");
            reloadSwModalAfterVote();
        }
    };

    window.closeModal = function() { document.getElementById('globalModal').style.display = "none"; };

    window.triggerSurpriseSw = function() {
        if (!sortedSwIds || sortedSwIds.length === 0) return;
        const randomSwId = sortedSwIds[Math.floor(Math.random() * sortedSwIds.length)];
        openModalSw(randomSwId);
    };

    window.reloadSwModalAfterVote = async function() {
        const titleText = document.getElementById('modalTitle').innerText;
        const swId = titleText.split(' - ')[0];
        await loadSoftwares();
        if(swId) openModalSw(swId);
    };

    loadSoftwares();
</script>
